<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
[data-theme="dark"]{
  --bg:#0c0c0f;--bg2:#111116;--bg3:#17171d;--bg4:#1e1e26;--bg5:#252530;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--border3:rgba(255,255,255,.2);
  --text:#eeedf0;--text2:#8888a0;--text3:#50505f;
  --green:#00d68f;--green-dim:rgba(0,214,143,.1);--green-bright:#00ffaa;
  --red:#f0506e;--red-dim:rgba(240,80,110,.1);
  --blue:#5b9cf6;--blue-dim:rgba(91,156,246,.1);
  --amber:#f0a030;--purple:#a78bfa;
  --chart-grid:rgba(255,255,255,.05);--tick:#505060;
}
[data-theme="light"]{
  --bg:#f2f2f5;--bg2:#ffffff;--bg3:#ffffff;--bg4:#f0f0f4;--bg5:#e8e8ee;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--border3:rgba(0,0,0,.22);
  --text:#0f0f18;--text2:#505068;--text3:#a0a0b8;
  --green:#00a86b;--green-dim:rgba(0,168,107,.08);--green-bright:#007a50;
  --red:#d63050;--red-dim:rgba(214,48,80,.08);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,.08);
  --amber:#d97706;--purple:#7c3aed;
  --chart-grid:rgba(0,0,0,.06);--tick:#b0b0c0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:224px;flex:1;min-height:100vh;padding-top:0}

/* ── Theme toggle ── */
.topbar{position:fixed;top:0;right:0;left:224px;height:44px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:0 1.5rem;z-index:99;gap:10px}
.theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;background:var(--bg3);transition:all .15s}
.theme-toggle:hover{color:var(--text2)}
.tog-track{width:26px;height:14px;background:var(--bg4);border-radius:7px;position:relative;transition:background .2s}
.tog-thumb{width:10px;height:10px;background:var(--text3);border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s}
[data-theme="light"] .tog-thumb{left:14px;background:var(--blue)}
[data-theme="light"] .tog-track{background:var(--blue-dim)}
.main-content{padding:1.5rem 1.75rem;margin-top:44px}

/* ── Sidebar ── */
.sidebar-logo{padding:1.25rem 1.25rem .9rem;border-bottom:1px solid var(--border)}
.logo-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.logo-title{font-size:11px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em}
.sidebar-nav{padding:.5rem 0;flex:1}
.nav-group{padding:.5rem 1.25rem .2rem;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:.5rem 1.25rem;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all .12s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(128,128,255,.05)}
.nav-item.active{color:var(--green);font-weight:600;border-left-color:var(--green);background:var(--green-dim)}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.55}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{padding:.9rem 1.25rem;border-top:1px solid var(--border)}
.update-btn{width:100%;padding:.55rem;font-size:12px;font-family:'IBM Plex Sans',sans-serif;font-weight:500;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px}
.update-btn:hover{border-color:var(--green);color:var(--green)}
.last-update{font-size:10px;color:var(--text3);text-align:center;margin-top:.4rem;font-family:'IBM Plex Mono',monospace}

/* ── Pages ── */
.page{display:none;animation:fadeIn .18s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.025em}
.page-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}

/* ── Filters ── */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:1.25rem;padding:1rem 1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;font-weight:500}
.date-row{display:flex;gap:4px;align-items:center}
.date-row input[type=date]{font-size:11px;padding:5px 8px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;font-family:'IBM Plex Mono',monospace;width:120px}
.date-sep{font-size:11px;color:var(--text3)}
.quick-btns{display:flex;gap:3px;margin-top:3px}
.qbtn{font-size:11px;padding:3px 8px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .1s}
.qbtn:hover,.qbtn.active{border-color:var(--green);color:var(--green);background:var(--green-dim)}

/* ── Multiselect ── */
.ms-wrap{position:relative}
.ms-btn{font-size:12px;padding:5px 9px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;min-width:140px;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif}
.ms-btn.active-sel{border-color:var(--green);color:var(--green)}
.ms-dropdown{position:fixed;background:var(--bg2);border:1px solid var(--border3);border-radius:7px;min-width:200px;max-height:280px;overflow-y:auto;z-index:999;display:none;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.ms-dropdown.open{display:block}
.ms-opt{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .1s}
.ms-opt:hover{background:rgba(128,128,255,.07);color:var(--text)}
.ms-opt.sel{color:var(--green)}
.ms-chk{width:13px;height:13px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.ms-opt.sel .ms-chk{background:var(--green);border-color:var(--green);color:var(--bg)}
.ms-clear{padding:6px 12px;font-size:10px;color:var(--text3);cursor:pointer;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;text-align:center}
.ms-clear:hover{color:var(--red)}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem}
.kpi-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.02em;text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1;font-variant-numeric:tabular-nums}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.neu{color:var(--text)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px;font-family:'IBM Plex Mono',monospace}

/* ── Cards ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card:last-child{margin-bottom:0}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:.9rem;letter-spacing:-.01em}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.chart-wrap{position:relative;width:100%}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;font-size:12px;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--bg4)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.total-row td{font-weight:700;border-top:1px solid var(--border2);color:var(--text);background:var(--bg4)}
.tbl tbody tr:hover td{background:rgba(128,128,255,.04)}

/* ── Streak ── */
.streak{display:flex;flex-wrap:wrap;gap:3px}
.dot{width:12px;height:12px;border-radius:2px;cursor:default;transition:transform .1s}
.dot:hover{transform:scale(1.4)}
.dot.w{background:var(--green)}.dot.l{background:var(--red)}.dot.hw{background:var(--amber)}.dot.hl{background:var(--amber)}.dot.v{background:var(--bg5)}
.streak-stats{margin-top:9px;display:flex;gap:14px;flex-wrap:wrap}
.streak-stats span{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}

/* ── Heatmap ── */
.heatmap-table{width:100%;border-collapse:separate;border-spacing:3px}
.heatmap-table th{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-weight:500;padding:2px 4px}
.heat-cell{height:26px;border-radius:3px;text-align:center;vertical-align:middle;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;cursor:default;transition:opacity .15s;font-variant-numeric:tabular-nums}
.heat-cell:hover{opacity:.75}
.heat-empty{height:26px;background:var(--bg4);border-radius:3px;opacity:.25}

/* ── Daily view ── */
.daily-year-header{font-size:12px;font-weight:700;color:var(--text);padding:.6rem .9rem;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;margin-bottom:.5rem;cursor:default;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em}
.month-block{margin-bottom:.75rem;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--bg4);cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;font-weight:600}
.month-header:hover{background:var(--bg5)}
.month-toggle{font-size:10px;color:var(--text3);transition:transform .2s}
.month-toggle.open{transform:rotate(180deg)}
.month-body{display:none}
.month-body.open{display:block;overflow-x:auto}

/* ── Tipster comparison ── */
.tipster-lines-chart{position:relative;width:100%}

/* ── Loader ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;color:var(--text3);font-size:12px;font-family:'IBM Plex Mono',monospace}
.spinner{width:24px;height:24px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:var(--red-dim);border:1px solid var(--red);border-radius:8px;padding:1.25rem;color:var(--red);font-size:12px;line-height:1.8;font-family:'IBM Plex Mono',monospace;max-width:560px;margin:2rem auto}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
</style>
</head>
<body>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbz_a_v27TpfVQh7sbiO058PGtERG1HzcxYCNh8RCovCZYq6dDnDnMY0tXNM8jf4EF_4/exec";
const BASE_BANK=100000;
</script>
<div id="root"><div class="loader"><div class="spinner"></div><span>carregando dados...</span></div></div>
<script>
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const TIPSTER_COLORS=['#00d68f','#5b9cf6','#f0a030','#a78bfa','#f0506e','#00c8ff','#ffd700','#ff8c69','#98fb98','#dda0dd','#87ceeb','#ffa07a','#90ee90','#ff69b4','#40e0d0'];
let DADOS=[], charts={};

// ── Theme ──
function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeLabel').textContent=t==='dark'?'Claro':'Escuro';const active=document.querySelector('.page.active')?.id?.replace('page-','');if(active)renderPage(active);}
(()=>{const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);})();

// ── Helpers ──
function fmt(v,d=2){return Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtPL(v){return(v>=0?'+ R$ ':'- R$ ')+fmt(Math.abs(v));}
function fmtR(v){return'R$ '+fmt(v,0);}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mkChart(id,cfg){destroyChart(id);if(!document.getElementById(id))return;charts[id]=new Chart(document.getElementById(id),cfg);}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function gc(){return isDark()?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';}
function tc(){return isDark()?'#505060':'#a0a0b8';}
function normalCDF(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989423*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>0?1-p:p;}
function calcROI(rows){const s=rows.reduce((a,r)=>a+r.stake,0),l=rows.reduce((a,r)=>a+r.lucro,0);return s>0?(l/s)*100:0;}
function calcWR(rows){const v=rows.filter(r=>['W','HW'].includes(r.resultado));const t=rows.filter(r=>r.resultado!=='V');return t.length>0?(v.length/t.length)*100:0;}
function calcAvgOdd(rows){const real=rows.filter(r=>r.resultado!=='V'&&r.odd>0&&r.stake>0);const ss=real.reduce((a,r)=>a+r.stake,0);return ss>0?real.reduce((a,r)=>a+r.odd*r.stake,0)/ss:0;}
function calcMDDreais(rows){let cum=0,peak=0,mdd=0;for(const r of rows){cum+=r.lucro;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>mdd)mdd=dd;}return mdd;}
function calcMDDpct(rows){let bank=BASE_BANK,peak=BASE_BANK,mdd=0;for(const r of rows){bank+=r.lucro;if(bank>peak)peak=bank;const dd=(peak-bank)/peak*100;if(dd>mdd)mdd=dd;}return mdd;}
function calcXMDD(rows,sims=250){const settled=rows.filter(r=>r.resultado!=='V');if(settled.length<5)return 0;const n=settled.length,wr=calcWR(rows)/100;const avgOdd=settled.reduce((a,r)=>a+r.odd,0)/settled.length;const avgStake=rows.reduce((a,r)=>a+r.stake,0)/rows.length;let total=0;for(let s=0;s<sims;s++){let cum=0,peak=0,mdd=0;for(let i=0;i<n;i++){const win=Math.random()<wr;cum+=win?avgStake*(avgOdd-1):-avgStake;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>mdd)mdd=dd;}total+=mdd;}return total/sims;}
function calcPValue(rows){const settled=rows.filter(r=>r.resultado!=='V');const wins=settled.filter(r=>['W','HW'].includes(r.resultado)).length;const n=settled.length;if(n<5)return 1;const avgOdd=settled.reduce((a,r)=>a+r.odd,0)/n;const z=(wins/n-1/avgOdd)/Math.sqrt((1/avgOdd)*(1-1/avgOdd)/n);return Math.max(0.001,Math.min(0.999,1-normalCDF(z)));}

// ── Filter state per page ──
const FS={};
function gfs(p){if(!FS[p])FS[p]={df:'',dt:'',qd:0};return FS[p];}
function filtrarPagina(p){
  const st=gfs(p);let d=[...DADOS];
  if(st.df)d=d.filter(r=>r.data>=st.df);
  if(st.dt)d=d.filter(r=>r.data<=st.dt);
  if(st.qd>0){const lim=new Date(Date.now()-st.qd*864e5).toISOString().slice(0,10);d=d.filter(r=>r.data>=lim);}
  const sp=msGet('sp_'+p),ca=msGet('ca_'+p);
  if(sp.size>0)d=d.filter(r=>sp.has(r.esporte));
  if(ca.size>0)d=d.filter(r=>ca.has(r.casa));
  return d;
}
function setDateF(p,type,val){const st=gfs(p);st.qd=0;if(type==='f')st.df=val;else st.dt=val;rqb(p);renderPage(p);}
function setQuick(p,days){const st=gfs(p);st.qd=days;st.df='';st.dt='';const f=document.getElementById('df_f_'+p),t=document.getElementById('df_t_'+p);if(f)f.value='';if(t)t.value='';rqb(p);renderPage(p);}
function clearDate(p){const st=gfs(p);st.qd=0;st.df='';st.dt='';const f=document.getElementById('df_f_'+p),t=document.getElementById('df_t_'+p);if(f)f.value='';if(t)t.value='';rqb(p);renderPage(p);}
function rqb(p){const st=gfs(p);document.querySelectorAll(`#page-${p} .qbtn`).forEach(b=>{const d=parseInt(b.dataset.days||'0');if(b.dataset.all)b.className='qbtn'+(st.qd===0&&!st.df&&!st.dt?' active':'');else b.className='qbtn'+(st.qd===d?' active':'');});}

// ── Multiselect ──
const MSS={};
function msGet(id){return MSS[id]||new Set();}
function msInit(id){MSS[id]=new Set();}
function msToggle(id,val){if(!MSS[id])MSS[id]=new Set();if(val==='__all__'){MSS[id]=new Set();return;}if(MSS[id].has(val))MSS[id].delete(val);else MSS[id].add(val);}
function msTipsterGet(){return MSS['tipsters']||new Set();}

function buildMS(id,items,ph,page,cb){
  if(!MSS[id])MSS[id]=new Set();
  const hasSel=MSS[id]?.size>0;
  return `<div class="ms-wrap" id="msw_${id}">
    <div class="ms-btn ${hasSel?'active-sel':''}" id="msb_${id}" onclick="openMS(event,'${id}','${page}','${cb||''}')">
      <span id="msl_${id}">${hasSel?(MSS[id].size===1?[...MSS[id]][0]:MSS[id].size+' sel.'):ph}</span>
      <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </div>
    <div class="ms-dropdown" id="msd_${id}">
      <div class="ms-opt ${!hasSel?'sel':''}" onclick="clickMS('${id}','__all__','${page}','${cb||''}')"><span class="ms-chk">${!hasSel?'✓':''}</span><span>Todos</span></div>
      ${items.map(it=>`<div class="ms-opt ${MSS[id]?.has(it)?'sel':''}" onclick="clickMS('${id}','${it.replace(/'/g,"\\'")}','${page}','${cb||''}')"><span class="ms-chk">${MSS[id]?.has(it)?'✓':''}</span><span>${it}</span></div>`).join('')}
      ${hasSel?`<div class="ms-clear" onclick="clickMS('${id}','__all__','${page}','${cb||''}')">Limpar seleção</div>`:''}
    </div>
  </div>`;
}

function openMS(e,id,page,cb){
  e.stopPropagation();
  const btn=document.getElementById('msb_'+id);
  const drop=document.getElementById('msd_'+id);
  if(!drop)return;
  const isOpen=drop.classList.contains('open');
  document.querySelectorAll('.ms-dropdown.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen){
    const rect=btn.getBoundingClientRect();
    drop.style.top=(rect.bottom+4)+'px';
    drop.style.left=rect.left+'px';
    drop.classList.add('open');
  }
}
document.addEventListener('click',()=>document.querySelectorAll('.ms-dropdown.open').forEach(d=>d.classList.remove('open')));

function clickMS(id,val,page,cb){
  msToggle(id,val);
  refreshMS(id,page,cb);
  if(cb)window[cb]&&window[cb](page);
  else renderPage(page);
}
function refreshMS(id,page,cb){
  const hasSel=MSS[id]?.size>0;
  const btn=document.getElementById('msb_'+id);
  const lbl=document.getElementById('msl_'+id);
  const drop=document.getElementById('msd_'+id);
  if(lbl){const ph=btn?.dataset?.ph||'';lbl.textContent=hasSel?(MSS[id].size===1?[...MSS[id]][0]:MSS[id].size+' sel.'):ph;}
  if(btn)btn.className='ms-btn'+(hasSel?' active-sel':'');
  if(drop){
    drop.querySelectorAll('.ms-opt').forEach((o,i)=>{
      if(i===0){o.className='ms-opt'+(!hasSel?' sel':'');o.querySelector('.ms-chk').textContent=!hasSel?'✓':'';return;}
      const v=o.querySelector('span:last-child').textContent;
      const s=MSS[id]?.has(v);
      o.className='ms-opt'+(s?' sel':'');
      o.querySelector('.ms-chk').textContent=s?'✓':'';
    });
    const cl=drop.querySelector('.ms-clear');
    if(hasSel&&!cl){const d=document.createElement('div');d.className='ms-clear';d.textContent='Limpar seleção';d.onclick=()=>clickMS(id,'__all__',page,cb);drop.appendChild(d);}
    else if(!hasSel&&cl)cl.remove();
  }
}

function renderPage(id){

  else if(id==='daily'){renderDaily();}

// ── KPI ──
function renderKPI(rows){
  const lucro=rows.reduce((a,r)=>a+r.lucro,0),stake=rows.reduce((a,r)=>a+r.stake,0);
  const roi=calcROI(rows),wr=calcWR(rows),n=rows.length;
  const wins=rows.filter(r=>r.resultado==='W').length,losses=rows.filter(r=>r.resultado==='L').length;
  document.getElementById('kpiGrid').innerHTML=[
    {l:'P/L Total',v:fmtPL(lucro),c:lucro>=0?'pos':'neg',s:'Turnover: '+fmtR(stake)},
    {l:'ROI',v:(roi>=0?'+':'')+roi.toFixed(2)+'%',c:roi>=0?'pos':'neg',s:n+' apostas'},
    {l:'Win Rate',v:wr.toFixed(1)+'%',c:wr>=50?'pos':'neg',s:wins+' W / '+losses+' L'},
    {l:'Odd Ponderada',v:calcAvgOdd(rows).toFixed(2),c:'neu',s:'Σ(odd×stake)/Σ(stake)'},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
}

// ── P/L Chart ──
function renderBankroll(rows){
  const byDay={};rows.forEach(r=>{const k=r.data.slice(0,10);if(!byDay[k])byDay[k]=0;byDay[k]+=r.lucro;});
  const days=Object.keys(byDay).sort(),dpL=days.map(k=>byDay[k]);
  let cum=0;const cumPL=dpL.map(v=>{cum+=v;return parseFloat(cum.toFixed(2));});
  const step=Math.max(1,Math.floor(days.length/14));
  const lbl=days.filter((_,i)=>i%step===0||i===days.length-1).map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  const cumF=cumPL.filter((_,i)=>i%step===0||i===cumPL.length-1);
  const dpF=dpL.filter((_,i)=>i%step===0||i===dpL.length-1);
  mkChart('chartBankroll',{type:'bar',data:{labels:lbl,datasets:[
    {type:'line',data:cumF,borderColor:'#00d68f',tension:.4,pointRadius:0,fill:false,borderWidth:2,yAxisID:'y1',label:'Acumulado'},
    {type:'bar',data:dpF,backgroundColor:dpF.map(v=>v>=0?'rgba(0,214,143,.55)':'rgba(240,80,110,.55)'),borderRadius:3,yAxisID:'y',label:'Diário'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>(ctx.dataset.label||'')+': R$ '+fmt(ctx.raw)}}},scales:{
    x:{ticks:{color:tc(),font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{display:false},border:{display:false}},
    y:{ticks:{color:tc(),font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{color:gc()},border:{display:false},position:'left'},
    y1:{ticks:{color:tc(),font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{display:false},border:{display:false},position:'right'}
  }}});
}

// ── ROI Mensal ──

}

// ── Odds Distribution (combo: qty + win rate + ROI) ──
function renderOddsDist(rows){
  const bins=[1,1.5,2.0,2.5,3.0,4.0,6.0,999];
  const lbls=['1.0-1.5','1.5-2.0','2.0-2.5','2.5-3.0','3.0-4.0','4.0-6.0','6.0+'];
  const bdata=lbls.map(()=>({n:0,w:0,pl:0,s:0}));
  rows.filter(r=>r.resultado!=='V').forEach(r=>{
    for(let i=0;i<bins.length-1;i++){
      if(r.odd>=bins[i]&&r.odd<bins[i+1]){
        bdata[i].n++;bdata[i].pl+=r.lucro;bdata[i].s+=r.stake;
        if(['W','HW'].includes(r.resultado))bdata[i].w++;
        break;
      }
    }
  });
  const counts=bdata.map(b=>b.n);
  const wrs=bdata.map(b=>b.n>0?parseFloat((b.w/b.n*100).toFixed(1)):0);
  const rois=bdata.map(b=>b.s>0?parseFloat((b.pl/b.s*100).toFixed(2)):0);
  mkChart('chartOddsDist',{type:'bar',data:{labels:lbls,datasets:[
    {type:'bar',data:counts,backgroundColor:'rgba(91,156,246,.55)',borderRadius:3,label:'Apostas',yAxisID:'y'},
    {type:'line',data:wrs,borderColor:'#00d68f',backgroundColor:'transparent',tension:.3,pointRadius:4,pointBackgroundColor:'#00d68f',borderWidth:2,label:'Win Rate %',yAxisID:'y1'},
    {type:'line',data:rois,borderColor:'#f0a030',backgroundColor:'transparent',tension:.3,pointRadius:4,pointBackgroundColor:'#f0a030',borderWidth:2,label:'ROI %',yAxisID:'y2',borderDash:[4,3]}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:11},boxWidth:12,padding:16}},tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===0)return'Apostas: '+ctx.raw;if(ctx.datasetIndex===1)return'Win Rate: '+ctx.raw.toFixed(1)+'%';return'ROI: '+ctx.raw.toFixed(2)+'%';}}}},scales:{
    x:{ticks:{color:tc(),font:{size:10}},grid:{display:false},border:{display:false}},
    y:{ticks:{color:tc(),font:{size:10}},grid:{color:gc()},border:{display:false},position:'left',title:{display:true,text:'Apostas',color:tc(),font:{size:9}}},
    y1:{ticks:{color:'#00d68f',font:{size:10},callback:v=>v.toFixed(0)+'%'},grid:{display:false},border:{display:false},position:'right',title:{display:true,text:'Win Rate',color:'#00d68f',font:{size:9}}},
    y2:{ticks:{color:'#f0a030',font:{size:10},callback:v=>v.toFixed(0)+'%'},grid:{display:false},border:{display:false},position:'right',offset:true,title:{display:true,text:'ROI',color:'#f0a030',font:{size:9}}}
  }}});
}

// ── Heatmap ──
function renderHeatmap(rows){
  const byM={};rows.forEach(r=>{const d=new Date(r.data+'T12:00:00');const k=d.getFullYear()+'-'+d.getMonth();if(!byM[k])byM[k]={l:0,s:0,mes:d.getMonth(),ano:d.getFullYear()};byM[k].l+=r.lucro;byM[k].s+=r.stake;});
  const anos=[...new Set(Object.values(byM).map(v=>v.ano))].sort();
  const vals=Object.values(byM).map(v=>v.l);
  const maxAbs=Math.max(...vals.map(Math.abs),1);
  let html=`<table class="heatmap-table"><thead><tr><th></th>${MESES.map(m=>`<th style="text-align:center">${m}</th>`).join('')}</tr></thead><tbody>`;
  anos.forEach(ano=>{
    html+=`<tr><th style="text-align:right;padding-right:8px;color:var(--text3);font-size:10px;white-space:nowrap">${ano}</th>`;
    for(let m=0;m<12;m++){
      const k=ano+'-'+m;
      if(byM[k]){
        const v=byM[k].l,alpha=0.15+Math.min(1,Math.abs(v)/maxAbs)*0.75;
        const bg=v>=0?`rgba(0,214,143,${alpha})`:`rgba(240,80,110,${alpha})`;
        const col=v>=0?'#00d68f':'#f0506e';
        const roi=byM[k].s>0?(v/byM[k].s*100).toFixed(2):'0.00';
        html+=`<td class="heat-cell" style="background:${bg};color:${col}" title="${MESES[m]}/${ano}: ${fmtPL(v)} (ROI ${roi}%)">${roi}%</td>`;
      } else html+=`<td class="heat-empty"></td>`;
    }
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('heatmapWrap').innerHTML=html;
}

// ── Esportes & Casas ──
function buildSummaryTable(label,ents){
  const rows=ents.map(([nome,d])=>{
    const roi=d.s>0?(d.l/d.s*100):0;
    const wr=d.t>0?(d.w/d.t*100):0;
    const lc=d.l>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    return `<tr><td style="font-weight:600;color:var(--text)">${nome}</td><td>${d.n}</td><td>${wr.toFixed(1)}% (${d.w}/${d.t})</td><td>${fmtR(d.s)}</td><td style="${lc}">${fmtPL(d.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td></tr>`;
  }).join('');
  const tot=ents.reduce((a,[,d])=>({n:a.n+d.n,w:a.w+d.w,t:a.t+d.t,s:a.s+d.s,l:a.l+d.l}),{n:0,w:0,t:0,s:0,l:0});
  const tRoi=tot.s>0?(tot.l/tot.s*100):0;
  const tWr=tot.t>0?(tot.w/tot.t*100):0;
  const tlc=tot.l>=0?'color:var(--green)':'color:var(--red)';
  const trc=tRoi>=0?'color:var(--green)':'color:var(--red)';
  return `<div class="tbl-wrap" style="margin-top:.75rem"><table class="tbl"><thead><tr><th>${label}</th><th>Bets</th><th>Won%</th><th>Staked</th><th>Profit</th><th>ROI</th></tr></thead><tbody>${rows}<tr class="total-row"><td>Total</td><td>${tot.n}</td><td>${tWr.toFixed(1)}% (${tot.w}/${tot.t})</td><td>${fmtR(tot.s)}</td><td style="${tlc}">${fmtPL(tot.l)}</td><td style="${trc}">${(tRoi>=0?'+':'')+tRoi.toFixed(2)}%</td></tr></tbody></table></div>`;
}

// ── Tipsters ──
function renderTipsters(){
  const selTipsters=msTipsterGet();
  const baseRows=filtrarPagina('tipsters');
  const allTipsters=[...new Set(DADOS.map(r=>r.tipster).filter(Boolean))].sort();
  const activeTipsters=selTipsters.size>0?[...selTipsters]:allTipsters;

  // Comparison chart
  renderTipsterComparison(baseRows,activeTipsters);
  // Comparison table
  renderTipsterTable(baseRows,activeTipsters);
  // Monthly analysis for selected single or all
  const singleTipster=selTipsters.size===1?[...selTipsters][0]:'all';
  renderTipsterMonthly(baseRows,singleTipster);
  // Streak
  const streakRows=singleTipster==='all'?baseRows:baseRows.filter(r=>r.tipster===singleTipster);
  renderStreak(streakRows,'tipsterStreak','tipsterStreakStats');
}

function renderTipsterComparison(rows,tipsters){
  const byTipsterDay={};
  tipsters.forEach(t=>{byTipsterDay[t]={};});
  rows.filter(r=>tipsters.includes(r.tipster)).forEach(r=>{
    if(!byTipsterDay[r.tipster])byTipsterDay[r.tipster]={};
    const k=r.data.slice(0,10);
    if(!byTipsterDay[r.tipster][k])byTipsterDay[r.tipster][k]=0;
    byTipsterDay[r.tipster][k]+=r.lucro;
  });
  const allDays=[...new Set(rows.map(r=>r.data.slice(0,10)))].sort();
  const step=Math.max(1,Math.floor(allDays.length/20));
  const lbl=allDays.filter((_,i)=>i%step===0||i===allDays.length-1).map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  const datasets=tipsters.slice(0,15).map((t,i)=>{
    let cum=0;const data=allDays.map(d=>{cum+=byTipsterDay[t]?.[d]||0;return parseFloat(cum.toFixed(2));}).filter((_,i)=>i%step===0||i===allDays.length-1);
    return{label:t,data,borderColor:TIPSTER_COLORS[i%TIPSTER_COLORS.length],backgroundColor:'transparent',tension:.4,pointRadius:0,borderWidth:2};
  });
  mkChart('chartTipsterLines',{type:'line',data:{labels:lbl,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:10},boxWidth:10,padding:12}}},scales:{x:{ticks:{color:tc(),font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{display:false},border:{display:false}},y:{ticks:{color:tc(),font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{color:gc()},border:{display:false}}}}});
}

function renderTipsterTable(rows,tipsters){
  const map={};
  rows.filter(r=>tipsters.includes(r.tipster)).forEach(r=>{
    if(!map[r.tipster])map[r.tipster]={l:0,s:0,n:0,w:0,t:0,odds:[]};
    map[r.tipster].l+=r.lucro;map[r.tipster].s+=r.stake;map[r.tipster].n++;
    if(r.resultado!=='V'){map[r.tipster].t++;if(['W','HW'].includes(r.resultado))map[r.tipster].w++;}
    if(r.odd>0&&r.stake>0)map[r.tipster].odds.push({odd:r.odd,stake:r.stake});
  });
  const ents=Object.entries(map).sort((a,b)=>b[1].l-a[1].l);
  document.getElementById('tipsterCompTable').innerHTML=`<table class="tbl"><thead><tr><th>Tipster</th><th>Bets</th><th>Won%</th><th>Staked</th><th>Profit</th><th>ROI</th><th>Odd Pond.</th><th>Stake Méd.</th></tr></thead><tbody>${
    ents.map(([t,d])=>{
      const roi=d.s>0?(d.l/d.s*100):0;
      const wr=d.t>0?(d.w/d.t*100):0;
      const avgOdd=d.odds.length>0?d.odds.reduce((a,o)=>a+o.odd*o.stake,0)/d.odds.reduce((a,o)=>a+o.stake,0):0;
      const avgStake=d.n>0?d.s/d.n:0;
      const lc=d.l>=0?'color:var(--green)':'color:var(--red)';
      const rc=roi>=0?'color:var(--green)':'color:var(--red)';
      return`<tr><td style="font-weight:600;color:var(--text)">${t}</td><td>${d.n}</td><td>${wr.toFixed(1)}%</td><td>${fmtR(d.s)}</td><td style="${lc}">${fmtPL(d.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td><td>${avgOdd.toFixed(2)}</td><td>${fmtR(avgStake)}</td></tr>`;
    }).join('')
  }</tbody></table>`;
}

function renderTipsterMonthly(rows,tipster){
  const trows=tipster==='all'?rows:rows.filter(r=>r.tipster===tipster);
  const byM={};
  trows.forEach(r=>{
    const d=new Date(r.data+'T12:00:00'),k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if(!byM[k])byM[k]={bets:0,pl:0,s:0,w:0,t:0,odds:[],ano:d.getFullYear(),mes:d.getMonth()};
    byM[k].bets++;byM[k].pl+=r.lucro;byM[k].s+=r.stake;
    if(r.resultado!=='V'){byM[k].t++;if(['W','HW'].includes(r.resultado))byM[k].w++;}
    if(r.odd>0&&r.stake>0)byM[k].odds.push({odd:r.odd,stake:r.stake});
  });
  let totPL=0,totS=0,totB=0,totW=0,totT=0;
  const mks=Object.keys(byM).sort();
  const bodyHTML=mks.map(k=>{
    const v=byM[k];
    const roi=v.s>0?(v.pl/v.s*100):0;
    const wr=v.t>0?(v.w/v.t*100):0;
    const avgOdd=v.odds.length>0?v.odds.reduce((a,o)=>a+o.odd*o.stake,0)/v.odds.reduce((a,o)=>a+o.stake,0):0;
    const avgStake=v.bets>0?v.s/v.bets:0;
    totPL+=v.pl;totS+=v.s;totB+=v.bets;totW+=v.w;totT+=v.t;
    const pc=v.pl>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    return`<tr><td>${MESES[v.mes]} ${v.ano}</td><td>${v.bets}</td><td style="${pc}">${fmtPL(v.pl)}</td><td>${fmtR(v.s)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td><td>${wr.toFixed(1)}%</td><td>${fmtR(avgStake)}</td><td>${avgOdd.toFixed(2)}</td></tr>`;
  }).join('');
  const tRoi=totS>0?(totPL/totS*100):0;const tWr=totT>0?(totW/totT*100):0;
  const tc2=totPL>=0?'color:var(--green)':'color:var(--red)';const rc2=tRoi>=0?'color:var(--green)':'color:var(--red)';
  document.querySelector('#tipsterMonthTable tbody').innerHTML=bodyHTML+`<tr class="total-row"><td>Total</td><td>${totB}</td><td style="${tc2}">${fmtPL(totPL)}</td><td>${fmtR(totS)}</td><td style="${rc2}">${(tRoi>=0?'+':'')+tRoi.toFixed(2)}%</td><td>${tWr.toFixed(1)}%</td><td>${totB>0?fmtR(totS/totB):'—'}</td><td>—</td></tr>`;
}

// ── Daily view ──
function renderDaily(){
  const rows=filtrarPagina('daily');
  const allTipsters=[...new Set(rows.map(r=>r.tipster).filter(Boolean))].sort();
  // Group by year → month → day
  const byYMD={};
  rows.forEach(r=>{
    const d=new Date(r.data+'T12:00:00');
    const y=d.getFullYear(),m=d.getMonth(),day=r.data.slice(0,10);
    if(!byYMD[y])byYMD[y]={};
    if(!byYMD[y][m])byYMD[y][m]={};
    if(!byYMD[y][m][day])byYMD[y][m][day]={};
    allTipsters.forEach(t=>{if(!byYMD[y][m][day][t])byYMD[y][m][day][t]={pl:0,n:0,w:0,t:0};});
    if(!byYMD[y][m][day][r.tipster])byYMD[y][m][day][r.tipster]={pl:0,n:0,w:0,t:0};
    byYMD[y][m][day][r.tipster].pl+=r.lucro;
    byYMD[y][m][day][r.tipster].n++;
    if(r.resultado!=='V'){byYMD[y][m][day][r.tipster].t++;if(['W','HW'].includes(r.resultado))byYMD[y][m][day][r.tipster].w++;}
  });
  // Annual summary
  const annualByTipster={};
  allTipsters.forEach(t=>{annualByTipster[t]={pl:0,n:0,w:0,t2:0};});
  rows.forEach(r=>{
    if(!annualByTipster[r.tipster])annualByTipster[r.tipster]={pl:0,n:0,w:0,t2:0};
    annualByTipster[r.tipster].pl+=r.lucro;annualByTipster[r.tipster].n++;
    if(r.resultado!=='V'){annualByTipster[r.tipster].t2++;if(['W','HW'].includes(r.resultado))annualByTipster[r.tipster].w++;}
  });

  const thCols=allTipsters.map(t=>`<th title="${t}">${t.length>10?t.slice(0,10)+'…':t}</th>`).join('');
  const annualRow=allTipsters.map(t=>{
    const d=annualByTipster[t]||{pl:0,n:0,w:0,t2:0};
    const c=d.pl>=0?'color:var(--green)':'color:var(--red)';
    return`<td style="${c};font-weight:600">${fmtPL(d.pl)}<br><span style="font-size:9px;color:var(--text3)">${d.n} bets ${d.t2>0?(d.w/d.t2*100).toFixed(0)+'%':''}</span></td>`;
  }).join('');

  let html=`<div class="card" style="overflow-x:auto">
    <div class="card-title">Consolidado Anual</div>
    <table class="tbl"><thead><tr><th>Tipster</th>${thCols}</tr></thead>
    <tbody><tr><td style="font-weight:700;color:var(--text)">Total Anual</td>${annualRow}</tr></tbody></table>
  </div>`;

  const anos=Object.keys(byYMD).sort().reverse();
  anos.forEach(ano=>{
    const meses=Object.keys(byYMD[ano]).sort();
    html+=`<div class="daily-year-header">── ${ano}</div>`;
    meses.sort((a,b)=>b-a).forEach(m=>{
      const monthKey=`daily_${ano}_${m}`;
      const days=Object.keys(byYMD[ano][m]).sort().reverse();
      // Month summary
      const mSumByT={};allTipsters.forEach(t=>{mSumByT[t]={pl:0,n:0,w:0,t2:0};});
      days.forEach(day=>{allTipsters.forEach(t=>{if(byYMD[ano][m][day]?.[t]){mSumByT[t].pl+=byYMD[ano][m][day][t].pl;mSumByT[t].n+=byYMD[ano][m][day][t].n;mSumByT[t].w+=byYMD[ano][m][day][t].w;mSumByT[t].t2+=byYMD[ano][m][day][t].t;}});});
      const mTotalPL=allTipsters.reduce((a,t)=>a+mSumByT[t].pl,0);
      const mPLcol=mTotalPL>=0?'color:var(--green)':'color:var(--red)';
      const mSumCols=allTipsters.map(t=>{const d=mSumByT[t];const c=d.pl!==0?(d.pl>=0?'color:var(--green)':'color:var(--red)'):'color:var(--text3)';return`<td style="${c}">${d.pl!==0?fmtPL(d.pl):'—'}<br><span style="font-size:9px;color:var(--text3)">${d.n>0?d.n+' bets':''}</span></td>`;}).join('');
      const dayRows=days.map(day=>{
        const dayCols=allTipsters.map(t=>{const d=byYMD[ano][m][day]?.[t];if(!d||d.n===0)return`<td style="color:var(--text3)">—</td>`;const c=d.pl>=0?'color:var(--green)':'color:var(--red)';const wr=d.t>0?(d.w/d.t*100).toFixed(0)+'%':'';return`<td style="${c}">${fmtPL(d.pl)}<br><span style="font-size:9px;color:var(--text3)">${d.n} bets ${wr}</span></td>`;}).join('');
        const dp=new Date(day+'T12:00:00');const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dp.getDay()];
        return`<tr><td style="color:var(--text2);white-space:nowrap">${ds} ${day.slice(8)}</td>${dayCols}</tr>`;
      }).join('');

      html+=`<div class="month-block"><div class="month-header" onclick="toggleMonth('${monthKey}')">
        <span style="font-weight:700">${MESES[parseInt(m)]} ${ano}</span>
        <span style="${mPLcol};font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtPL(mTotalPL)}</span>
        <span class="month-toggle" id="tog_${monthKey}">▼</span>
      </div>
      <div class="month-body" id="body_${monthKey}">
        <table class="tbl">
          <thead><tr><th>Data</th>${thCols}</tr></thead>
          <tbody>${dayRows}<tr class="total-row"><td>Total ${MESES[parseInt(m)]}</td>${mSumCols}</tr></tbody>
        </table>
      </div></div>`;
    });
  });
  document.getElementById('dailyContent').innerHTML=html;
  // Open current month
  const now=new Date();
  const curKey=`daily_${now.getFullYear()}_${now.getMonth()}`;
  toggleMonth(curKey,true);
}

function toggleMonth(key,forceOpen){
  const body=document.getElementById('body_'+key);
  const tog=document.getElementById('tog_'+key);
  if(!body)return;
  const isOpen=body.classList.contains('open');
  if(forceOpen||!isOpen){body.classList.add('open');if(tog)tog.style.transform='rotate(180deg)';}
  else{body.classList.remove('open');if(tog)tog.style.transform='';}
}

// ── Parceiros ──
function renderParceiros(rows){
  const map={};
  rows.forEach(r=>{const key=r.fornecedor+'||'+r.conta+'||'+r.casa;if(!map[key])map[key]={conta:r.conta,forn:r.fornecedor,casa:r.casa,n:0,s:0,l:0,datas:[]};map[key].n++;map[key].s+=r.stake;map[key].l+=r.lucro;map[key].datas.push(r.data);});
  document.querySelector('#tblParceiros tbody').innerHTML=Object.values(map).sort((a,b)=>b.l-a.l).map(e=>{
    const roi=e.s>0?(e.l/e.s*100):0;
    const lc=e.l>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    const sorted=e.datas.slice().sort();
    const d1=sorted[0].slice(0,10).split('-'),d2=sorted[sorted.length-1].slice(0,10).split('-');
    const dias=Math.round((new Date(sorted[sorted.length-1])-new Date(sorted[0]))/864e5);
    return`<tr><td style="font-weight:600;color:var(--text)">${e.forn||'—'}</td><td>${e.conta}</td><td>${e.casa}</td><td>${e.n}</td><td>R$ ${fmt(e.s,0)}</td><td style="${lc}">${fmtPL(e.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(1)}%</td><td>${d1[2]}/${d1[1]}/${d1[0].slice(2)}</td><td>${d2[2]}/${d2[1]}/${d2[0].slice(2)}</td><td>${dias}d</td></tr>`;
  }).join('');
}

// ── Streak ──
function renderStreak(rows,divId,statsId){
  const last=rows.slice(-60);
  document.getElementById(divId).innerHTML=last.map(r=>{const d=new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR');return`<span class="dot ${r.resultado.toLowerCase()}" title="${r.resultado} — ${r.esporte} — ${d}"></span>`;}).join('');
  const wins=last.filter(r=>['W','HW'].includes(r.resultado)).length;
  const losses=last.filter(r=>['L','HL'].includes(r.resultado)).length;
  const curRes=last.length?last[last.length-1].resultado:'';
  let cur=0;for(let i=last.length-1;i>=0;i--){if(['W','HW'].includes(last[i].resultado)===(['W','HW'].includes(curRes)))cur++;else break;}
  const isWin=['W','HW'].includes(curRes);
  document.getElementById(statsId).innerHTML=`<span>Wins: <strong style="color:var(--green)">${wins}</strong></span><span>Losses: <strong style="color:var(--red)">${losses}</strong></span><span style="color:${isWin?'var(--green)':'var(--red)'}">${cur} ${isWin?'wins':'losses'} seguidos</span>`;
}

// ── Advanced ──
function renderAdvanced(rows){
  const mddR=calcMDDreais(rows),mddPct=calcMDDpct(rows);
  const xmdd=calcXMDD(rows),emdd=xmdd*0.85;
  const pval=calcPValue(rows),pl=rows.reduce((a,r)=>a+r.lucro,0);
  const profEmdd=emdd>0?(pl/emdd).toFixed(2):'—';
  [
    {l:'MDD Real (R$)',v:'R$ '+fmt(mddR,0),c:mddR<5000?'pos':mddR<15000?'neu':'neg',s:'pior queda acumulada real'},
    {l:'MDD Real (%)',v:mddPct.toFixed(2)+'%',c:mddPct<15?'pos':mddPct<30?'neu':'neg',s:'% do bankroll máximo'},
    {l:'EMDD (R$)',v:'R$ '+fmt(emdd,0),c:emdd<5000?'pos':emdd<15000?'neu':'neg',s:'drawdown esperado'},
    {l:'XMDD Monte Carlo',v:'R$ '+fmt(xmdd,0),c:xmdd<5000?'pos':xmdd<15000?'neu':'neg',s:'drawdown médio simulado'},
    {l:'P-Value',v:pval<0.001?'<0.001':pval.toFixed(3),c:pval<0.05?'pos':pval<0.15?'neu':'neg',s:pval<0.05?'estatist. significativo':'não significativo'},
    {l:'Profit / EMDD',v:profEmdd,c:parseFloat(profEmdd)>=5?'pos':parseFloat(profEmdd)>=2?'neu':'neg',s:'> 5 = excelente'},
  ].forEach((k,i)=>{const el=document.querySelectorAll('#kpiAdvanced .kpi')[i];if(el){el.querySelector('.kpi-label').textContent=k.l;el.querySelector('.kpi-val').textContent=k.v;el.querySelector('.kpi-val').className='kpi-val '+k.c;el.querySelector('.kpi-sub').textContent=k.s;}});
}

    </div></main>
  </div>`;

  document.getElementById('themeLabel').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'Claro':'Escuro';
  showPage('overview');
}

async function loadData(){
  document.getElementById('root').innerHTML=`<div class="loader"><div class="spinner"></div><span>carregando dados...</span></div>`;
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    const json=await res.json();
    if(!json.ok)throw new Error(json.error||'Erro desconhecido');
    DADOS=json.data;
    buildHTML();
    document.getElementById('lastUpdate').textContent=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(err){
    document.getElementById('root').innerHTML=`<div style="padding:2rem"><div class="error-box"><strong>Erro ao carregar dados</strong><br><br>${err.message}</div></div>`;
  }
}
loadData();
</script>

<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
[data-theme="dark"]{
  --bg:#0c0c0f;--bg2:#111116;--bg3:#17171d;--bg4:#1e1e26;--bg5:#252530;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--border3:rgba(255,255,255,.22);
  --text:#eeedf0;--text2:#8888a0;--text3:#50505f;
  --green:#00d68f;--green-dim:rgba(0,214,143,.1);
  --red:#f0506e;--red-dim:rgba(240,80,110,.1);
  --blue:#5b9cf6;--amber:#f0a030;--purple:#a78bfa;--teal:#2dd4bf;
  --grid:rgba(255,255,255,.05);--tick:#505060;
  --hw:#34d399;--hw-dim:rgba(52,211,153,.12);
  --hl:#f87171;--hl-dim:rgba(248,113,113,.12);
  --sb-track:#1e1e26;--sb-thumb:#3a3a4a;--sb-thumb-hover:#5a5a6e;
}
[data-theme="light"]{
  --bg:#f2f2f5;--bg2:#fff;--bg3:#fff;--bg4:#f0f0f4;--bg5:#e4e4ea;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);--border3:rgba(0,0,0,.22);
  --text:#0f0f18;--text2:#505068;--text3:#a0a0b8;
  --green:#00a86b;--green-dim:rgba(0,168,107,.08);
  --red:#d63050;--red-dim:rgba(214,48,80,.08);
  --blue:#2563eb;--amber:#d97706;--purple:#7c3aed;--teal:#0d9488;
  --grid:rgba(0,0,0,.06);--tick:#b0b0c0;
  --hw:#059669;--hw-dim:rgba(5,150,105,.08);
  --hl:#b91c1c;--hl-dim:rgba(185,28,28,.08);
  --sb-track:#e4e4ea;--sb-thumb:#b0b0c0;--sb-thumb-hover:#8080a0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:224px;flex:1;min-height:100vh}
.topbar{position:fixed;top:0;right:0;left:224px;height:44px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:0 1.5rem;z-index:99;gap:10px}
.theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;background:var(--bg3)}
.tog-track{width:26px;height:14px;background:var(--bg4);border-radius:7px;position:relative}
.tog-thumb{width:10px;height:10px;background:var(--text3);border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s}
[data-theme="light"] .tog-thumb{left:14px;background:var(--blue)}
.main-content{padding:1.5rem 1.75rem;margin-top:44px}
/* Sidebar */
.sidebar-logo{padding:1.25rem 1.25rem .9rem;border-bottom:1px solid var(--border)}
.logo-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.logo-title{font-size:11px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.sidebar-nav{padding:.5rem 0;flex:1}
.nav-group{padding:.5rem 1.25rem .2rem;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:.5rem 1.25rem;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;transition:all .12s;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(128,128,255,.05)}
.nav-item.active{color:var(--green);font-weight:600;border-left-color:var(--green);background:var(--green-dim)}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.55}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{padding:.9rem 1.25rem;border-top:1px solid var(--border)}
.update-btn{width:100%;padding:.55rem;font-size:12px;font-family:'IBM Plex Sans',sans-serif;font-weight:500;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.update-btn:hover{border-color:var(--green);color:var(--green)}
.last-update{font-size:10px;color:var(--text3);text-align:center;margin-top:.4rem;font-family:'IBM Plex Mono',monospace}
/* Pages */
.page{display:none;animation:fadeIn .18s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.025em}
.page-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:1.25rem;padding:1rem 1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;font-weight:500}
.date-row{display:flex;gap:4px;align-items:center}
.date-row input[type=date]{font-size:11px;padding:5px 8px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;font-family:'IBM Plex Mono',monospace;width:120px}
.date-sep{font-size:11px;color:var(--text3)}
.quick-btns{display:flex;gap:3px;margin-top:3px}
.qbtn{font-size:11px;padding:3px 8px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .1s}
.qbtn:hover,.qbtn.active{border-color:var(--green);color:var(--green);background:var(--green-dim)}
/* Multiselect */
.ms-wrap{position:relative}
.ms-btn{font-size:12px;padding:5px 9px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;min-width:140px;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif}
.ms-btn.asel{border-color:var(--green);color:var(--green)}
.ms-dd{position:fixed;background:var(--bg2);border:1px solid var(--border3);border-radius:7px;min-width:200px;max-height:280px;overflow-y:auto;z-index:9999;display:none;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.ms-dd.open{display:block}
.ms-opt{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text2)}
.ms-opt:hover{background:rgba(128,128,255,.07);color:var(--text)}
.ms-opt.sel{color:var(--green)}
.ms-chk{width:13px;height:13px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.ms-opt.sel .ms-chk{background:var(--green);border-color:var(--green);color:#000}
.ms-cl{padding:6px 12px;font-size:10px;color:var(--text3);cursor:pointer;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;text-align:center}
.ms-cl:hover{color:var(--red)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem}
.kpi-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.02em;text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1;font-variant-numeric:tabular-nums}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.neu{color:var(--text)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px;font-family:'IBM Plex Mono',monospace}
/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0;margin-bottom:1rem;overflow:hidden}
.card:last-child{margin-bottom:0}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;cursor:pointer;user-select:none;gap:8px;min-height:44px}
.card-hdr:hover{background:rgba(128,128,255,.03)}
.card-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin:0;flex:1}
.card-tog{width:18px;height:18px;border-radius:4px;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--text3);transition:transform .2s,background .12s}
.card-hdr:hover .card-tog{background:var(--bg5);color:var(--text2)}
.card-body{padding:.1rem 1.25rem 1.1rem;transition:none}
.card.collapsed .card-body{display:none}
.card.collapsed .card-tog{transform:rotate(-90deg)}
/* row2 always equal height */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;align-items:stretch}
.row2>.card{margin-bottom:0;display:flex;flex-direction:column}
.row2>.card .card-body{flex:1;display:flex;flex-direction:column}
.chart-wrap{position:relative;width:100%;flex:1}
/* Sortable tables */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;font-size:12px;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--bg4);cursor:pointer;user-select:none;position:sticky;top:0}
.tbl th:hover{color:var(--text)}
.tbl th .sort-icon{margin-left:4px;opacity:.4;font-size:9px}
.tbl th.sort-asc .sort-icon::after{content:'↑';opacity:1}
.tbl th.sort-desc .sort-icon::after{content:'↓';opacity:1}
.tbl th .sort-icon::after{content:'↕'}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.total-row td{font-weight:700;border-top:1px solid var(--border2);color:var(--text);background:var(--bg4)}
.tbl tbody tr:hover td{background:rgba(128,128,255,.04)}
/* Daily */
.month-block{margin-bottom:.75rem;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.month-hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--bg4);cursor:pointer;font-size:12px;font-weight:600}
.month-hdr:hover{background:var(--bg5)}
.month-tog{font-size:10px;color:var(--text3);transition:transform .2s}
.month-body{display:none;overflow-x:auto}
.month-body.open{display:block}
.daily-tbl{border-collapse:collapse;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.daily-tbl th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border2);background:var(--bg4);text-align:right;position:sticky;top:0}
.daily-tbl th:first-child{text-align:left;min-width:120px}
.daily-tbl th.acc-col{text-align:right;color:var(--text2);border-right:1px solid var(--border2)}
.daily-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;text-align:right}
.daily-tbl td:first-child{text-align:left;font-weight:600;color:var(--text);position:sticky;left:0;background:var(--bg3);border-right:1px solid var(--border)}
.daily-tbl td.acc-col{border-right:1px solid var(--border2)}
.daily-tbl tr:last-child td{border-bottom:none}
.daily-tbl tr.total-row td{font-weight:700;background:var(--bg4);color:var(--text);border-top:1px solid var(--border2)}
.cell-pos{color:var(--green)}.cell-neg{color:var(--red)}.cell-neu{color:var(--text3)}
/* Streak */
.streak{display:flex;flex-wrap:wrap;gap:3px}
.dot{width:12px;height:12px;border-radius:2px;cursor:default}
.dot.w{background:var(--green)}.dot.l{background:var(--red)}.dot.hw{background:var(--amber)}.dot.hl{background:var(--amber)}.dot.v{background:var(--bg5)}
/* Heatmap */
.heatmap-table{width:100%;border-collapse:separate;border-spacing:3px}
.heatmap-table th{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-weight:500;padding:2px 4px}
.heat-cell{height:26px;border-radius:3px;text-align:center;vertical-align:middle;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;cursor:default;font-variant-numeric:tabular-nums}
.heat-cell:hover{opacity:.75}
.heat-empty{height:26px;background:var(--bg4);border-radius:3px;opacity:.25}
/* Metrics knowledge base */
.metric-section{margin-bottom:1.5rem}
.metric-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid var(--border2)}
.metric-formula{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:.75rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--blue);margin:.5rem 0}
.metric-desc{font-size:13px;color:var(--text2);line-height:1.7;margin:.5rem 0}
.metric-example{background:var(--green-dim);border-left:3px solid var(--green);padding:.5rem .75rem;border-radius:0 4px 4px 0;font-size:12px;color:var(--text2);margin:.5rem 0;font-family:'IBM Plex Mono',monospace}
.metric-warn{background:var(--red-dim);border-left:3px solid var(--red);padding:.5rem .75rem;border-radius:0 4px 4px 0;font-size:12px;color:var(--text2);margin:.5rem 0}
.term-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.75rem}
.term-card{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:.75rem 1rem}
.term-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.term-def{font-size:12px;color:var(--text2);line-height:1.6}
/* Apostas virtual scroll */
.apostas-cont{overflow:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg3)}
.apostas-cont table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12px;font-variant-numeric:tabular-nums}
.apostas-cont thead{position:sticky;top:0;z-index:10}
.apostas-cont th{background:var(--bg4);padding:7px 8px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text);font-weight:700;border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none}
.apostas-cont th:hover{color:var(--text)}
.apostas-cont th.r{text-align:right}
.apostas-cont th.c{text-align:center}
.apostas-cont .cf-row th{background:var(--bg4);padding:2px 4px;border-bottom:2px solid var(--border2)}
.apostas-cont .cf-row input{width:100%;font-size:10px;padding:3px 5px;background:var(--bg5);border:1px solid var(--border);color:var(--text2);border-radius:3px;font-family:'IBM Plex Mono',monospace;outline:none}
.apostas-cont .cf-row input:focus{border-color:var(--green)}
.apostas-cont td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.apostas-cont tr:hover td{background:rgba(128,128,255,.04)}
/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;color:var(--text3);font-size:12px;font-family:'IBM Plex Mono',monospace}
.spinner{width:24px;height:24px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:var(--red-dim);border:1px solid var(--red);border-radius:8px;padding:1.25rem;color:var(--red);font-size:12px;line-height:1.8;font-family:'IBM Plex Mono',monospace;max-width:560px;margin:2rem auto}
/* Scrollbars visíveis em todo dashboard */
*{scrollbar-width:thin;scrollbar-color:var(--sb-thumb) var(--sb-track);}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--sb-track);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--sb-thumb);border-radius:4px;border:2px solid var(--sb-track)}
::-webkit-scrollbar-thumb:hover{background:var(--sb-thumb-hover)}
::-webkit-scrollbar-corner{background:var(--sb-track)}
/* Result badge colors - global */
.res-w{color:var(--green);font-weight:700}
.res-hw{color:var(--hw);font-weight:700}
.res-l{color:var(--red);font-weight:700}
.res-hl{color:var(--hl);font-weight:700}
.res-v{color:var(--text3);font-weight:700}
/* Streak dot HW/HL override */
.dot.hw{background:var(--hw)!important}.dot.hl{background:var(--hl)!important}
/* Multiselect search input */
.ms-search{width:calc(100% - 16px);margin:6px 8px 4px;padding:5px 8px;font-size:11px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:'IBM Plex Mono',monospace;outline:none;display:block}
.ms-search:focus{border-color:var(--green)}
/* Column resizer handle */
.col-rsz{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;z-index:5;background:transparent}
.col-rsz:hover,.col-rsz.active{background:var(--green);opacity:.5}
</style>
</head>

<div id="root"><div class="loader"><div class="spinner"></div><span>carregando dados...</span></div></div>
<script>
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const TC_COLORS=['#00d68f','#5b9cf6','#f0a030','#a78bfa','#f0506e','#2dd4bf','#ffd700','#ff8c69','#98fb98','#dda0dd','#87ceeb','#ffa07a','#c084fc','#fb923c','#34d399'];
let DADOS=[], charts={};

// Theme
function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);const lbl=document.getElementById('themeLabel');if(lbl)lbl.textContent=t==='dark'?'Claro':'Escuro';const active=document.querySelector('.page.active')?.id?.replace('page-','');if(active)renderPage(active);}
(()=>{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');})();

// Helpers
function fmt(v,d=2){return Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtPL(v){return(v>=0?'+ R$ ':'- R$ ')+fmt(Math.abs(v));}
function fmtR(v){return'R$ '+fmt(v,0);}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function mkChart(id,cfg){destroyChart(id);if(!document.getElementById(id))return;charts[id]=new Chart(document.getElementById(id),cfg);}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function gc(){return isDark()?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';}
function tc(){return isDark()?'#505060':'#a0a0b8';}
// Casa icon helpers
function casaIconUrl(nome){
  if(!nome)return'';
  // exact match first, then case-insensitive
  if(CASA_ICONS[nome])return CASA_ICONS[nome];
  const k=Object.keys(CASA_ICONS).find(k=>k.toLowerCase()===nome.toLowerCase());
  return k?CASA_ICONS[k]:'';
}
function casaImg(nome,size=14){
  const url=casaIconUrl(nome);
  if(!url)return'';
  return`<img src="${url}" width="${size}" height="${size}" style="border-radius:3px;vertical-align:middle;margin-right:4px;flex-shrink:0;image-rendering:crisp-edges" onerror="this.style.display='none'" loading="lazy">`;
}
function casaCell(nome){
  const img=casaImg(nome);
  return img?`<span style="display:inline-flex;align-items:center;gap:0">${img}${nome||'—'}</span>`:(nome||'—');
}
function normalCDF(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989423*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>0?1-p:p;}
function calcROI(rows){const s=rows.reduce((a,r)=>a+r.stake,0),l=rows.reduce((a,r)=>a+r.lucro,0);return s>0?(l/s)*100:0;}
function calcWR(rows){const v=rows.filter(r=>['W','HW'].includes(r.resultado));const t=rows.filter(r=>r.resultado!=='V');return t.length>0?(v.length/t.length)*100:0;}
function calcAvgOdd(rows){const real=rows.filter(r=>r.odd>0&&r.stake>0);const ss=real.reduce((a,r)=>a+r.stake,0);return ss>0?real.reduce((a,r)=>a+r.odd*r.stake,0)/ss:0;}
function calcMDDreais(rows){let cum=0,peak=0,mdd=0;for(const r of rows){cum+=r.lucro;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>mdd)mdd=dd;}return mdd;}
function calcMDDpct(rows){let bank=BASE_BANK,peak=BASE_BANK,mdd=0;for(const r of rows){bank+=r.lucro;if(bank>peak)peak=bank;const dd=(peak-bank)/peak*100;if(dd>mdd)mdd=dd;}return mdd;}
function calcXMDD(rows,sims=250){const settled=rows.filter(r=>r.resultado!=='V');if(settled.length<5)return 0;const n=settled.length,wr=calcWR(rows)/100;const avgOdd=settled.reduce((a,r)=>a+r.odd,0)/settled.length;const avgStake=rows.reduce((a,r)=>a+r.stake,0)/rows.length;let total=0;for(let s=0;s<sims;s++){let cum=0,peak=0,mdd=0;for(let i=0;i<n;i++){const win=Math.random()<wr;cum+=win?avgStake*(avgOdd-1):-avgStake;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>mdd)mdd=dd;}total+=mdd;}return total/sims;}
function calcPValue(rows){const settled=rows.filter(r=>r.resultado!=='V');const wins=settled.filter(r=>['W','HW'].includes(r.resultado)).length;const n=settled.length;if(n<5)return 1;const avgOdd=settled.reduce((a,r)=>a+r.odd,0)/n;const z=(wins/n-1/avgOdd)/Math.sqrt((1/avgOdd)*(1-1/avgOdd)/n);return Math.max(0.001,Math.min(0.999,1-normalCDF(z)));}

// Filter state
const FS={};
function gfs(p){if(!FS[p])FS[p]={df:'',dt:'',qd:0};return FS[p];}
function filtrarPagina(p){
  const st=gfs(p);let d=[...DADOS];
  if(st.df)d=d.filter(r=>r.data>=st.df);
  if(st.dt)d=d.filter(r=>r.data<=st.dt);
  if(st.qd>0){const lim=new Date(Date.now()-st.qd*864e5).toISOString().slice(0,10);d=d.filter(r=>r.data>=lim);}
  const sp=msGet('sp_'+p),ca=msGet('ca_'+p),ti=msGet('ti_'+p);
  if(sp.size>0)d=d.filter(r=>sp.has(r.esporte));
  if(ca.size>0)d=d.filter(r=>ca.has(r.casa));
  if(ti.size>0)d=d.filter(r=>ti.has(r.tipster));
  return d;
}
function setDateF(p,type,val){const st=gfs(p);st.qd=0;if(type==='f')st.df=val;else st.dt=val;rqb(p);renderPage(p);}
function setQuick(p,days){const st=gfs(p);st.qd=days;st.df='';st.dt='';['df_f_'+p,'df_t_'+p].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});rqb(p);renderPage(p);}
function clearDate(p){const st=gfs(p);st.qd=0;st.df='';st.dt='';['df_f_'+p,'df_t_'+p].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});rqb(p);renderPage(p);}
function rqb(p){const st=gfs(p);document.querySelectorAll('#page-'+p+' .qbtn').forEach(b=>{if(b.dataset.all)b.className='qbtn'+(st.qd===0&&!st.df&&!st.dt?' active':'');else b.className='qbtn'+(st.qd===parseInt(b.dataset.days)?' active':'');});}

// Multiselect
const MSS={};
function msGet(id){return MSS[id]||new Set();}
function msInit(id){MSS[id]=new Set();}
function msToggle(id,val){if(!MSS[id])MSS[id]=new Set();if(val==='__all__'){MSS[id]=new Set();return;}if(MSS[id].has(val))MSS[id].delete(val);else MSS[id].add(val);}

function buildMS(id,items,ph,page,cb,withIcons=false){
  if(!MSS[id])MSS[id]=new Set();
  const hs=MSS[id]?.size>0;
  const optItems=items.map(it=>{
    const ico=withIcons?casaImg(it,13):'';
    const safe=it.replace(/'/g,"\\'").replace(/"/g,'\\"');
    const safeAttr=it.replace(/"/g,'&quot;');
    return`<div class="ms-opt ${MSS[id]?.has(it)?'sel':''}" data-val="${safeAttr}" onclick="clickMS('${id}','${safe}','${page}','${cb||''}')"><span class="ms-chk">${MSS[id]?.has(it)?'✓':''}</span><span style="display:inline-flex;align-items:center;gap:2px">${ico}${it}</span></div>`;
  }).join('');
  // selected label - show icon if single selection + icons mode
  const selLbl=hs?(MSS[id].size===1?[...MSS[id]][0]:MSS[id].size+' sel.'):ph;
  return`<div class="ms-wrap" id="msw_${id}">
    <div class="ms-btn ${hs?'asel':''}" id="msb_${id}" data-ph="${ph}" data-page="${page}" data-cb="${cb||''}" data-icons="${withIcons?1:0}" onclick="openMS(event,'${id}','${page}','${cb||''}')">
      <span id="msl_${id}">${hs&&withIcons&&MSS[id].size===1?casaImg([...MSS[id]][0],13)+[...MSS[id]][0]:selLbl}</span>
      <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </div>
    <div class="ms-dd" id="msd_${id}">
      <input class="ms-search" type="text" placeholder="Buscar..." oninput="filterMSOpts('${id}')" onclick="event.stopPropagation()">
      <div id="ms-opts-${id}">
        <div class="ms-opt ${!hs?'sel':''}" onclick="clickMS('${id}','__all__','${page}','${cb||''}')"><span class="ms-chk">${!hs?'✓':''}</span><span>Todos</span></div>
        ${optItems}
      </div>
      ${hs?`<div class="ms-cl" onclick="clickMS('${id}','__all__','${page}','${cb||''}')">Limpar seleção</div>`:''}
    </div>
  </div>`;
}
function filterMSOpts(id){
  const inp=document.querySelector(`#msd_${id} .ms-search`);
  if(!inp)return;
  const q=inp.value.toLowerCase();
  const optsWrap=document.getElementById('ms-opts-'+id);
  if(!optsWrap)return;
  optsWrap.querySelectorAll('.ms-opt').forEach((o,i)=>{
    if(i===0){o.style.display='';return;}// "Todos" always visible
    const v=o.querySelector('span:last-child')?.textContent||'';
    o.style.display=v.toLowerCase().includes(q)?'':'none';
  });
}
function openMS(e,id,page,cb){
  e.stopPropagation();
  const btn=document.getElementById('msb_'+id),drop=document.getElementById('msd_'+id);
  if(!drop)return;
  const isOpen=drop.classList.contains('open');
  document.querySelectorAll('.ms-dd.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen){
    const rect=btn.getBoundingClientRect();
    drop.style.top=(rect.bottom+4)+'px';
    drop.style.left=rect.left+'px';
    drop.classList.add('open');
    // focus search
    setTimeout(()=>{const s=drop.querySelector('.ms-search');if(s){s.value='';filterMSOpts(id);s.focus();}},50);
  }
}
document.addEventListener('click',()=>document.querySelectorAll('.ms-dd.open').forEach(d=>d.classList.remove('open')));
function clickMS(id,val,page,cb){msToggle(id,val);refreshMS(id);if(cb&&window[cb])window[cb](page);else renderPage(page);}
function refreshMS(id){
  const hs=MSS[id]?.size>0;
  const btn=document.getElementById('msb_'+id),lbl=document.getElementById('msl_'+id),drop=document.getElementById('msd_'+id);
  const ph=btn?.dataset?.ph||'';
  const withIcons=btn?.dataset?.icons==='1';
  if(lbl){
    if(hs){
      if(withIcons&&MSS[id].size===1){lbl.innerHTML=casaImg([...MSS[id]][0],13)+[...MSS[id]][0];}
      else lbl.textContent=MSS[id].size===1?[...MSS[id]][0]:MSS[id].size+' sel.';
    }else lbl.textContent=ph;
  }
  if(btn)btn.className='ms-btn'+(hs?' asel':'');
  if(drop){
    const optsWrap=document.getElementById('ms-opts-'+id);
    if(optsWrap)optsWrap.querySelectorAll('.ms-opt').forEach((o,i)=>{
      if(i===0){o.className='ms-opt'+(!hs?' sel':'');o.querySelector('.ms-chk').textContent=!hs?'✓':'';return;}
      const v=o.querySelector('span:last-child')?.textContent||o.querySelector('span:last-child')?.innerText||'';
      const s=MSS[id]?.has(v);
      o.className='ms-opt'+(s?' sel':'');
      o.querySelector('.ms-chk').textContent=s?'✓':'';
    });
    const cl=drop.querySelector('.ms-cl');
    if(hs&&!cl){const d=document.createElement('div');d.className='ms-cl';d.textContent='Limpar seleção';d.onclick=()=>{msToggle(id,'__all__');refreshMS(id);renderPage(id.split('_').pop());};drop.appendChild(d);}
    else if(!hs&&cl)cl.remove();
  }
}

function buildFilters(p,sports,casas,tipsters){
  const st=gfs(p);
  return`<div class="filters">
    <div class="filter-group">
      <div class="filter-label">Período</div>

// Formatação de eixos com ponto como separador de milhar
function fmtK(v){
  const abs=Math.abs(Math.round(v));
  const s=abs.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
  return(v<0?'-':'')+'R$ '+s;
}
const sortState={};
function parseNum(raw){
  // Remove R$, spaces, %, +, then handle Brazilian number format (dot=thousand, comma=decimal)
  const s=raw.replace(/R\$\s*/g,'').replace(/[+\s%]/g,'').trim();
  // Remove thousand separators (dots before groups of 3 digits) then replace comma with dot
  const n=parseFloat(s.replace(/\.(?=\d{3}[,\.])/g,'').replace(',','.'));
  return isNaN(n)?0:n;
}
function sortTable(tableId,colIdx,numeric){
  if(!sortState[tableId])sortState[tableId]={col:-1,asc:true};
  const st=sortState[tableId];
  st.asc=st.col===colIdx?!st.asc:true;
  st.col=colIdx;
  const table=document.getElementById(tableId);
  if(!table)return;
  const tbody=table.querySelector('tbody');
  const rows=[...tbody.querySelectorAll('tr:not(.total-row)')];
  rows.sort((a,b)=>{
    const at=a.cells[colIdx]?.textContent||'';
    const bt=b.cells[colIdx]?.textContent||'';
    const res=numeric?(parseNum(at)-parseNum(bt)):(at.trim().localeCompare(bt.trim()));
    return st.asc?res:-res;
  });
  const totalRow=tbody.querySelector('.total-row');
  rows.forEach(r=>tbody.appendChild(r));
  if(totalRow)tbody.appendChild(totalRow);
  table.querySelectorAll('th').forEach((th,i)=>{
    th.className=i===colIdx?(st.asc?'sort-asc':'sort-desc'):'';
    if(!th.querySelector('.sort-icon')){const si=document.createElement('span');si.className='sort-icon';th.appendChild(si);}
  });
}
function makeSortable(tableId,numericCols=[]){
  const table=document.getElementById(tableId);
  if(!table)return;
  table.querySelectorAll('th').forEach((th,i)=>{
    const si=document.createElement('span');si.className='sort-icon';th.appendChild(si);
    th.style.cursor='pointer';
    th.onclick=()=>sortTable(tableId,i,numericCols.includes(i));
    addColResizer(th,tableId,i);
  });
}

// Column resize
const colWidths={};
function addColResizer(th,tableId,colIdx){
  th.style.position='relative';
  const rsz=document.createElement('div');
  rsz.className='col-rsz';
  rsz.addEventListener('mousedown',e=>{
    e.stopPropagation();e.preventDefault();
    rsz.classList.add('active');
    const startX=e.clientX,startW=th.offsetWidth;
    const key=tableId+'_'+colIdx;
    function onMove(ev){
      const nw=Math.max(40,startW+ev.clientX-startX);
      th.style.width=nw+'px';th.style.minWidth=nw+'px';
      colWidths[key]=nw;
      // Apply to td cells too
      const tbl=document.getElementById(tableId);
      if(tbl){tbl.querySelectorAll('tbody tr').forEach(tr=>{const td=tr.cells[colIdx];if(td){td.style.width=nw+'px';td.style.maxWidth=nw+'px';}});}
    }
    function onUp(){rsz.classList.remove('active');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  th.appendChild(rsz);
}

// Result coloring helper
function resClass(r){
  if(r==='W')return'res-w';
  if(r==='HW')return'res-hw';
  if(r==='L')return'res-l';
  if(r==='HL')return'res-hl';
  return'res-v';
}
function resColor(r){
  const m={'W':'var(--green)','HW':'var(--hw)','L':'var(--red)','HL':'var(--hl)','V':'var(--text3)'};
  return m[r]||'var(--text2)';
}

// Card collapse
const CARD_STATE_KEY='dash_cards_v1';
let cardStates={};
(()=>{try{cardStates=JSON.parse(localStorage.getItem(CARD_STATE_KEY)||'{}')}catch(e){}})();

// Nav
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');

}
function renderPage(id){
  const rows=filtrarPagina(id);
  if(id==='overview'){renderKPI(rows);renderBankroll(rows);renderROIMonthly(rows);renderOddsDist(rows);renderHeatmap(rows);renderOvTipsters(rows);}
  else if(id==='daily'){renderDaily();}
  else if(id==='sports'){renderSport(rows);renderCasa(rows);}
  else if(id==='tipsters'){renderTipsters();}
  else if(id==='apostas'){renderApostas();}
  else if(id==='parceiros'){renderParceiros(rows);}
  else if(id==='metrics'){renderMetrics(filtrarPagina('metrics'));}

// KPI
function renderKPI(rows){
  const lucro=rows.reduce((a,r)=>a+r.lucro,0),stake=rows.reduce((a,r)=>a+r.stake,0);
  const roi=calcROI(rows),n=rows.length;
  const W=rows.filter(r=>r.resultado==='W').length;
  const L=rows.filter(r=>r.resultado==='L').length;
  const HW=rows.filter(r=>r.resultado==='HW').length;
  const HL=rows.filter(r=>r.resultado==='HL').length;
  const V=rows.filter(r=>r.resultado==='V').length;
  const settled=rows.filter(r=>r.resultado!=='V').length;
  const wins=W+HW;
  const wr=settled>0?(wins/settled*100):0;
  document.getElementById('kpiGrid').innerHTML=[
    {l:'P/L Total',v:fmtPL(lucro),c:lucro>=0?'pos':'neg',s:'Turnover: '+fmtR(stake)},
    {l:'ROI',v:(roi>=0?'+':'')+roi.toFixed(2)+'%',c:roi>=0?'pos':'neg',s:n+' apostas'},
    {l:'Win Rate',v:wr.toFixed(1)+'%',c:wr>=50?'pos':'neg',s:`<span class="res-w">W:${W}</span> <span class="res-hw">HW:${HW}</span> <span class="res-l">L:${L}</span> <span class="res-hl">HL:${HL}</span> <span class="res-v">V:${V}</span>`},
    {l:'Odd Ponderada',v:calcAvgOdd(rows).toFixed(2),c:'neu',s:'Σ(odd×stake)/Σ(stake)'},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
}

function renderBankroll(rows){
  const byDay={};rows.forEach(r=>{const k=r.data.slice(0,10);if(!byDay[k])byDay[k]=0;byDay[k]+=r.lucro;});
  const days=Object.keys(byDay).sort();
  const dpL=days.map(k=>byDay[k]);
  let cum=0;const cumPL=dpL.map(v=>{cum+=v;return parseFloat(cum.toFixed(2));});
  // Labels every ~30 days to avoid clutter, shown vertically
  const labelStep=Math.max(1,Math.floor(days.length/14));
  const lbl=days.map((d,i)=>{
    if(i%labelStep!==0&&i!==days.length-1)return'';
    const p=d.split('-');return p[2]+'/'+p[1];
  });
  mkChart('chartBankroll',{type:'bar',data:{labels:lbl,datasets:[
    {type:'line',data:cumPL,borderColor:'#00d68f',tension:.4,pointRadius:0,fill:false,borderWidth:2,yAxisID:'y1',label:'Acumulado'},
    {type:'bar',data:dpL,backgroundColor:dpL.map(v=>v>=0?'rgba(0,214,143,.6)':'rgba(240,80,110,.6)'),borderRadius:1,yAxisID:'y',label:'Diário',barPercentage:0.9,categoryPercentage:1.0}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>(ctx.dataset.label||'')+': '+fmtK(ctx.raw),title:ctx=>{const i=ctx[0].dataIndex;return days[i]?.split('-').reverse().join('/')||'';},}}},
    scales:{
      x:{ticks:{color:tc(),font:{size:9},maxRotation:90,minRotation:90,autoSkip:false,callback:(v,i)=>lbl[i]||null},grid:{display:false},border:{display:false}},
      y:{ticks:{color:tc(),font:{size:10},callback:v=>fmtK(v)},grid:{color:gc()},border:{display:false},position:'left'},
      y1:{ticks:{color:tc(),font:{size:10},callback:v=>fmtK(v)},grid:{display:false},border:{display:false},position:'right'}
    }}});
}

function renderROIMonthly(rows){
  const byM={};rows.forEach(r=>{const d=new Date(r.data+'T12:00:00');const k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;if(!byM[k])byM[k]={pl:0,s:0,mes:d.getMonth(),ano:d.getFullYear()};byM[k].pl+=r.lucro;byM[k].s+=r.stake;});
  const mks=Object.keys(byM).sort();
  const lbl=mks.map(k=>{const v=byM[k];return MESES[v.mes]+' '+String(v.ano).slice(2);});
  const vals=mks.map(k=>byM[k].s>0?parseFloat((byM[k].pl/byM[k].s*100).toFixed(2)):0);
  function roiColor(v){
    if(v<=-10)return'rgba(180,20,40,.9)';
    if(v<-3)return'rgba(240,80,110,.75)';
    if(v<0)return'rgba(240,80,110,.45)';
    if(v<3)return'rgba(0,214,143,.4)';
    if(v<8)return'rgba(0,214,143,.65)';
    return'rgba(0,214,143,.9)';
  }
  // Use afterDraw plugin to draw labels directly on bars
  const roiLabelPlugin={id:'roiLabels',afterDatasetsDraw(chart){
    const{ctx,data,scales:{x,y}}=chart;
    ctx.save();
    data.datasets[0].data.forEach((val,i)=>{
      const bar=chart.getDatasetMeta(0).data[i];
      if(!bar)return;
      ctx.font='bold 10px IBM Plex Mono, monospace';
      ctx.fillStyle=isDark()?'rgba(255,255,255,.85)':'rgba(0,0,0,.75)';
      ctx.textAlign='center';
      ctx.textBaseline=val>=0?'bottom':'top';
      const yPos=val>=0?bar.y-3:bar.y+3;
      ctx.fillText((val>=0?'+':'')+val.toFixed(2)+'%',bar.x,yPos);
    });
    ctx.restore();
  }};
  mkChart('chartROI',{type:'bar',data:{labels:lbl,datasets:[{data:vals,backgroundColor:vals.map(roiColor),borderRadius:3,label:'ROI%'}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18,bottom:4}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw.toFixed(2)+'%'}}},scales:{x:{ticks:{color:tc(),font:{size:10},maxRotation:30},grid:{display:false},border:{display:false}},y:{ticks:{color:tc(),font:{size:10},callback:v=>v.toFixed(1)+'%'},grid:{color:gc()},border:{display:false}}}},plugins:[roiLabelPlugin]});
}

function renderOddsDist(rows){
  const bins=[1,1.5,2.0,2.5,3.0,4.0,6.0,10.0,30.0,100.0,Infinity];
  const lbls=['1.0–1.5','1.5–2.0','2.0–2.5','2.5–3.0','3.0–4.0','4.0–6.0','6.0–10','10–30','30–100','100+'];
  const bdata=lbls.map(()=>({n:0,w:0,pl:0,s:0}));
  rows.filter(r=>r.resultado!=='V').forEach(r=>{
    for(let i=0;i<bins.length-1;i++){
      if(r.odd>=bins[i]&&r.odd<bins[i+1]){bdata[i].n++;bdata[i].pl+=r.lucro;bdata[i].s+=r.stake;if(['W','HW'].includes(r.resultado))bdata[i].w++;break;}
    }
  });
  const counts=bdata.map(b=>b.n);
  const wrs=bdata.map(b=>b.n>0?parseFloat((b.w/b.n*100).toFixed(1)):null);
  const rois=bdata.map(b=>b.s>0?parseFloat((b.pl/b.s*100).toFixed(2)):null);
  mkChart('chartOddsDist',{type:'bar',data:{labels:lbls,datasets:[
    {type:'bar',data:counts,backgroundColor:'rgba(91,156,246,.55)',borderRadius:3,label:'Apostas',yAxisID:'y'},
    {type:'line',data:wrs,borderColor:'#00d68f',backgroundColor:'transparent',tension:.3,pointRadius:5,pointBackgroundColor:'#00d68f',borderWidth:2,label:'Win Rate %',yAxisID:'y1',spanGaps:false},
    {type:'line',data:rois,borderColor:'#f0a030',backgroundColor:'transparent',tension:.3,pointRadius:5,pointBackgroundColor:'#f0a030',borderWidth:2,label:'ROI %',yAxisID:'y2',borderDash:[4,3],spanGaps:false}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:11},boxWidth:12,padding:16}},
      tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===0)return'Apostas: '+ctx.raw;if(ctx.datasetIndex===1)return'Win Rate: '+(ctx.raw?.toFixed(1)||'—')+'%';return'ROI: '+(ctx.raw?.toFixed(2)||'—')+'%';}}}},
    scales:{
      x:{ticks:{color:tc(),font:{size:10}},grid:{display:false},border:{display:false}},
      y:{ticks:{color:tc(),font:{size:10}},grid:{color:gc()},border:{display:false},position:'left'},
      y1:{ticks:{color:'#00d68f',font:{size:10},callback:v=>v+'%'},grid:{display:false},border:{display:false},position:'right'},
      y2:{ticks:{color:'#f0a030',font:{size:10},callback:v=>v+'%'},grid:{display:false},border:{display:false},position:'right',offset:true}
    }}});
}

function renderHeatmap(rows){
  const byM={};rows.forEach(r=>{const d=new Date(r.data+'T12:00:00');const k=d.getFullYear()+'-'+d.getMonth();if(!byM[k])byM[k]={l:0,s:0,mes:d.getMonth(),ano:d.getFullYear()};byM[k].l+=r.lucro;byM[k].s+=r.stake;});
  const anos=[...new Set(Object.values(byM).map(v=>v.ano))].sort();
  const vals=Object.values(byM).map(v=>v.l);
  const maxAbs=Math.max(...vals.map(Math.abs),1);
  // Same color logic as daily heatmap
  function heatBg(v){const a=0.12+Math.min(1,Math.abs(v)/maxAbs)*0.82;return v>0?`rgba(0,160,100,${a})`:v<0?`rgba(200,40,60,${a})`:'transparent';}
  function heatTxt(v){
    if(v===0)return'var(--text3)';
    const a=0.12+Math.min(1,Math.abs(v)/maxAbs)*0.82;
    return a>0.5?(v>0?'#d0fff0':'#ffe0e5'):(v>0?'var(--green)':'var(--red)');
  }
  let html=`<table class="heatmap-table"><thead><tr><th></th>${MESES.map(m=>`<th style="text-align:center">${m}</th>`).join('')}</tr></thead><tbody>`;
  anos.forEach(ano=>{
    html+=`<tr><th style="text-align:right;padding-right:8px;color:var(--text3);font-size:10px;white-space:nowrap">${ano}</th>`;
    for(let m=0;m<12;m++){
      const k=ano+'-'+m;
      if(byM[k]){
        const v=byM[k].l;
        const roi=byM[k].s>0?(v/byM[k].s*100).toFixed(2):'0.00';
        html+=`<td class="heat-cell" style="background:${heatBg(v)};color:${heatTxt(v)}" title="${MESES[m]}/${ano}: ${fmtPL(v)} (ROI ${roi}%)">${roi}%</td>`;
      } else html+=`<td class="heat-empty"></td>`;
    }
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('heatmapWrap').innerHTML=html;
}

function renderOvTipsters(rows){
  const map={};
  rows.forEach(r=>{
    if(!r.tipster)return;
    if(!map[r.tipster])map[r.tipster]={pl:0,s:0,n:0,w:0,t:0};
    map[r.tipster].pl+=r.lucro;map[r.tipster].s+=r.stake;map[r.tipster].n++;
    if(r.resultado!=='V'){map[r.tipster].t++;if(['W','HW'].includes(r.resultado))map[r.tipster].w++;}
  });
  const ents=Object.entries(map).sort((a,b)=>b[1].pl-a[1].pl);
  const labels=ents.map(e=>e[0]);
  const pls=ents.map(e=>parseFloat(e[1].pl.toFixed(2)));
  const rois=ents.map(e=>e[1].s>0?parseFloat((e[1].pl/e[1].s*100).toFixed(2)):0);
  const wrs=ents.map(e=>e[1].t>0?parseFloat((e[1].w/e[1].t*100).toFixed(1)):0);

  // Bar chart: P/L bars + WR line + ROI line
  const h=Math.max(260,ents.length*22+80);
  const barWrap=document.querySelector('#chartOvTipsterBar')?.parentElement;
  if(barWrap)barWrap.style.height=h+'px';
  mkChart('chartOvTipsterBar',{type:'bar',data:{labels,datasets:[
    {type:'bar',data:pls,backgroundColor:pls.map(v=>v>=0?'rgba(0,214,143,.7)':'rgba(240,80,110,.7)'),borderRadius:3,label:'P/L (R$)',yAxisID:'y'},
    {type:'line',data:wrs,borderColor:'#5b9cf6',backgroundColor:'transparent',tension:.3,pointRadius:3,pointBackgroundColor:'#5b9cf6',borderWidth:2,label:'Win Rate %',yAxisID:'y1'},
    {type:'line',data:rois,borderColor:'#f0a030',backgroundColor:'transparent',tension:.3,pointRadius:3,pointBackgroundColor:'#f0a030',borderWidth:2,label:'ROI %',yAxisID:'y2',borderDash:[4,3]},
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:10},boxWidth:10,padding:10}},
      tooltip:{callbacks:{label:ctx=>{
        if(ctx.datasetIndex===0)return'P/L: '+fmtPL(ctx.raw);
        if(ctx.datasetIndex===1)return'Win Rate: '+ctx.raw.toFixed(1)+'%';
        return'ROI: '+ctx.raw.toFixed(2)+'%';
      }}}},
    scales:{
      x:{ticks:{color:tc(),font:{size:10},callback:v=>fmtK(v)},grid:{color:gc()},border:{display:false}},
      y:{ticks:{color:tc(),font:{size:11}},grid:{display:false},border:{display:false}},
      y1:{display:false,min:0,max:100},
      y2:{display:false}
    }}});

  // Donut chart: participation in positive P/L
  const winners=ents.filter(e=>e[1].pl>0);
  const totalPos=winners.reduce((a,e)=>a+e[1].pl,0);
  const PIE_COLORS=['#00d68f','#5b9cf6','#f0a030','#a78bfa','#2dd4bf','#f87171','#34d399','#fbbf24','#60a5fa','#c084fc','#fb923c','#ffd700','#ff8c69','#dda0dd','#87ceeb'];
  mkChart('chartOvTipsterPie',{type:'doughnut',
    data:{labels:winners.map(e=>e[0]),datasets:[{
      data:winners.map(e=>parseFloat(e[1].pl.toFixed(2))),
      backgroundColor:PIE_COLORS.slice(0,winners.length),
      borderWidth:2,borderColor:isDark()?'#17171d':'#fff'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'right',labels:{color:tc(),font:{size:11},boxWidth:12,padding:8,
          generateLabels(chart){
            const ds=chart.data.datasets[0];
            return chart.data.labels.map((lbl,i)=>{
              const v=ds.data[i];const pct=totalPos>0?(v/totalPos*100).toFixed(1):'0';
              return{text:`${lbl}  ${pct}%`,fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],hidden:false,index:i};
            });
          }}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtPL(ctx.raw)} (${totalPos>0?(ctx.raw/totalPos*100).toFixed(1):'0'}%)`}}
      }}});
}

// Daily — transposto: tipsters nas linhas, dias nas colunas
function renderDaily(){
  const rows=filtrarPagina('daily');
  const allTipsters=[...new Set(rows.map(r=>r.tipster).filter(Boolean))].sort();

  const annualByT={}, monthlyByT={}, byTYMD={};

  rows.forEach(r=>{
    const d=new Date(r.data+'T12:00:00');
    const ymKey=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    const dayKey=r.data.slice(0,10);
    const t=r.tipster; if(!t)return;
    const res=r.resultado;
    const isW=['W','HW'].includes(res), isL=['L','HL'].includes(res);

    if(!annualByT[t])annualByT[t]={pl:0,n:0,w:0,l:0,hw:0,hl:0,v:0};
    annualByT[t].pl+=r.lucro; annualByT[t].n++;
    if(res==='W')annualByT[t].w++; else if(res==='L')annualByT[t].l++;
    else if(res==='HW')annualByT[t].hw++; else if(res==='HL')annualByT[t].hl++;
    else if(res==='V')annualByT[t].v++;

    const mk=ymKey+'_'+t;
    if(!monthlyByT[mk])monthlyByT[mk]={pl:0,n:0,w:0,l:0,hw:0,hl:0,v:0,year:d.getFullYear(),month:d.getMonth()};
    monthlyByT[mk].pl+=r.lucro; monthlyByT[mk].n++;
    if(res==='W')monthlyByT[mk].w++; else if(res==='L')monthlyByT[mk].l++;
    else if(res==='HW')monthlyByT[mk].hw++; else if(res==='HL')monthlyByT[mk].hl++;
    else if(res==='V')monthlyByT[mk].v++;

    if(!byTYMD[ymKey])byTYMD[ymKey]={year:d.getFullYear(),month:d.getMonth(),days:{}};
    if(!byTYMD[ymKey].days[dayKey])byTYMD[ymKey].days[dayKey]={};
    if(!byTYMD[ymKey].days[dayKey][t])byTYMD[ymKey].days[dayKey][t]={pl:0,n:0,w:0,l:0,hw:0,hl:0,v:0};
    const cell=byTYMD[ymKey].days[dayKey][t];
    cell.pl+=r.lucro; cell.n++;
    if(res==='W')cell.w++; else if(res==='L')cell.l++;
    else if(res==='HW')cell.hw++; else if(res==='HL')cell.hl++;
    else if(res==='V')cell.v++;
  });

  const ymKeys=Object.keys(byTYMD).sort().reverse();

  // Sticky styles
  const sT='position:sticky;left:0;z-index:2;white-space:nowrap;';
  const sA='position:sticky;left:130px;z-index:2;white-space:nowrap;border-right:1px solid var(--border2);';
  const hBg='background:var(--bg4);';
  const rBg='background:var(--bg3);';

  function tipsterCell(d,bgVar){
    if(!d||d.n===0)return`<td style="color:var(--text3);text-align:right;padding:4px 8px;white-space:nowrap">—</td>`;
    const c=d.pl>0?'var(--green)':d.pl<0?'var(--red)':'var(--text3)';
    const detail=[d.w?`W:${d.w}`:'',d.hw?`HW:${d.hw}`:'',d.l?`L:${d.l}`:'',d.hl?`HL:${d.hl}`:'',d.v?`V:${d.v}`:''].filter(Boolean).join(' ');
    return`<td style="color:${c};text-align:right;padding:4px 8px;white-space:nowrap;vertical-align:top"><span style="font-weight:600">${fmtPL(d.pl)}</span><br><span style="font-size:9px;opacity:.55;color:var(--text3)">${d.n}b ${detail}</span></td>`;
  }

  // ── BLOCO 1: Resumo Anual ──
  const totPL=allTipsters.reduce((a,t)=>a+(annualByT[t]?.pl||0),0);
  const totN=allTipsters.reduce((a,t)=>a+(annualByT[t]?.n||0),0);
  const totS=rows.reduce((a,r)=>a+r.stake,0);
  const totROI=totS>0?(totPL/totS*100):0;
  const totW=allTipsters.reduce((a,t)=>a+(annualByT[t]?.w||0),0);
  const totHW=allTipsters.reduce((a,t)=>a+(annualByT[t]?.hw||0),0);
  const totL=allTipsters.reduce((a,t)=>a+(annualByT[t]?.l||0),0);
  const totHL=allTipsters.reduce((a,t)=>a+(annualByT[t]?.hl||0),0);
  const totV=allTipsters.reduce((a,t)=>a+(annualByT[t]?.v||0),0);
  const tlc=totPL>=0?'var(--green)':'var(--red)';
  const trc=totROI>=0?'var(--green)':'var(--red)';
  const totSettled=totW+totHW+totL+totHL;
  const totWR=totSettled>0?((totW+totHW)/totSettled*100):0;
  const totDetail=[totW?`W:${totW}`:'',totHW?`HW:${totHW}`:'',totL?`L:${totL}`:'',totHL?`HL:${totHL}`:'',totV?`V:${totV}`:''].filter(Boolean).join(' ');
  function tdR(content,extra=''){return`<td style="text-align:right;padding:5px 8px;white-space:nowrap;${extra}">${content}</td>`;}

  const totalAnnualRow=`<tr style="border-bottom:2px solid var(--border2);background:var(--bg4)">
    <td style="font-weight:700;color:var(--text);padding:5px 10px;text-align:left">Total</td>
    <td style="text-align:right;padding:5px 8px"><span style="font-size:14px;font-weight:700;color:var(--text)">${totN}</span><br><span style="font-size:9px;color:var(--text3)">${totDetail}</span></td>
    ${tdR(fmtPL(totPL),`color:${tlc};font-weight:700`)}
    ${tdR(fmtR(totS))}
    ${tdR((totROI>=0?'+':'')+totROI.toFixed(2)+'%',`color:${trc}`)}
    ${tdR(totWR.toFixed(1)+'%')}
    ${tdR(calcAvgOdd(rows).toFixed(2))}
    ${tdR(totN>0?fmtR(totS/totN):'—')}
  </tr>`;

  const anualRows=allTipsters.map(t=>{
    const d=annualByT[t];if(!d)return'';
    const tRows=rows.filter(r=>r.tipster===t);
    const turnover=tRows.reduce((a,r)=>a+r.stake,0);
    const roiV=turnover>0?(d.pl/turnover*100):0;
    const settled=d.w+d.hw+d.l+d.hl;
    const wr=settled>0?((d.w+d.hw)/settled*100):0;
    const avgOdd=calcAvgOdd(tRows);
    const avgStake=d.n>0?turnover/d.n:0;
    const lc=d.pl>=0?'var(--green)':'var(--red)';
    const rc=roiV>=0?'var(--green)':'var(--red)';
    const detail=[d.w?`W:${d.w}`:'',d.hw?`HW:${d.hw}`:'',d.l?`L:${d.l}`:'',d.hl?`HL:${d.hl}`:'',d.v?`V:${d.v}`:''].filter(Boolean).join(' ');
    return`<tr>
      <td style="font-weight:700;color:var(--text);padding:5px 10px;text-align:left">${t}</td>
      <td style="text-align:right;padding:5px 8px"><span style="font-size:13px;font-weight:700;color:var(--text)">${d.n}</span><br><span style="font-size:9px;color:var(--text3)">${detail}</span></td>
      ${tdR(fmtPL(d.pl),`color:${lc};font-weight:600`)}
      ${tdR(fmtR(turnover))}
      ${tdR((roiV>=0?'+':'')+roiV.toFixed(2)+'%',`color:${rc}`)}
      ${tdR(wr.toFixed(1)+'%')}
      ${tdR(avgOdd.toFixed(2))}
      ${tdR(fmtR(avgStake))}
    </tr>`;
  }).join('');

  const resumoAnualHTML=mkCard('daily_resumo',
    `Resumo Anual <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:${tlc};margin-left:10px">${fmtPL(totPL)}</span>`,
    `<div style="overflow-x:auto"><table class="tbl" id="tblDailyAnual" style="width:100%">
      <thead><tr>
        <th style="text-align:left;min-width:120px">Tipster<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:130px">Bets / Resultados<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:120px">P/L<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:100px">Turnover<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:70px">ROI<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:80px">Win Rate%<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:80px">Odd Méd.<span class="sort-icon"></span></th>
        <th style="text-align:right;min-width:90px">Stake Méd.<span class="sort-icon"></span></th>
      </tr></thead>
      <tbody>${totalAnnualRow}${anualRows}</tbody>
    </table></div>`);

  // ── BLOCO 2: Heatmap mensal ──
  const allPLs=ymKeys.flatMap(ym=>allTipsters.map(t=>monthlyByT[ym+'_'+t]?.pl||0));
  const maxAbsM=Math.max(...allPLs.map(Math.abs),1);
  function heatBg(v){const a=0.12+Math.min(1,Math.abs(v)/maxAbsM)*0.82;return v>0?`rgba(0,160,100,${a})`:v<0?`rgba(200,40,60,${a})`:'transparent';}
  function heatTxt(v){
    if(v===0)return'var(--text3)';
    const a=0.12+Math.min(1,Math.abs(v)/maxAbsM)*0.82;
    // texto claro sobre fundo saturado, colorido sobre fundo suave
    return a>0.5?(v>0?'#d0fff0':'#ffe0e5'):(v>0?'var(--green)':'var(--red)');
  }

  const mLabels=ymKeys.map(k=>{const v=byTYMD[k];return MESES[v.month]+' '+v.year;});
  const heatRows=allTipsters.map(t=>{
    const acc=annualByT[t];
    const accC=acc?.pl>=0?'var(--green)':acc?.pl<0?'var(--red)':'var(--text3)';
    const cells=ymKeys.map(ymKey=>{
      const d=monthlyByT[ymKey+'_'+t];
      if(!d||d.n===0)return`<td style="background:var(--bg4);border-radius:3px;padding:5px 8px;text-align:right;color:var(--text3);font-size:11px">—</td>`;
      const tRows=rows.filter(r=>r.tipster===t&&r.data.slice(0,7)===ymKey);
      const mStake=tRows.reduce((a,r)=>a+r.stake,0);
      const mROI=mStake>0?(d.pl/mStake*100):0;
      return`<td style="background:${heatBg(d.pl)};border-radius:3px;padding:5px 8px;text-align:right;color:${heatTxt(d.pl)};font-weight:600;white-space:nowrap;font-size:11px" title="${t} - ${mLabels[ymKeys.indexOf(ymKey)]}: ${fmtPL(d.pl)} (${d.n}b, ROI ${mROI.toFixed(2)}%)">${fmtPL(d.pl)}<br><span style="font-size:9px;opacity:.7">${(mROI>=0?'+':'')+mROI.toFixed(1)}% · ${d.n}b</span></td>`;
    }).join('');
    return`<tr>
      <td style="${sT}${rBg}font-weight:700;color:var(--text);padding:5px 10px;border-right:1px solid var(--border2);font-size:12px">${t}</td>
      <td style="${sA}${rBg}color:${accC};text-align:right;padding:5px 10px;font-weight:700;font-size:12px">${acc?fmtPL(acc.pl):'—'}<br><span style="font-size:9px;opacity:.55">${acc?.n||0}b</span></td>
      ${cells}
    </tr>`;
  }).join('');

  const heatTotalCells=ymKeys.map(ymKey=>{
    const pl=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.pl||0),0);
    const n=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.n||0),0);
    return`<td style="background:${heatBg(pl)};border-radius:3px;padding:5px 8px;text-align:right;color:${heatTxt(pl)};font-weight:700;white-space:nowrap;font-size:11px">${fmtPL(pl)}<br><span style="font-size:9px;opacity:.7">${n}b</span></td>`;
  }).join('');

  // Sortable heatmap: sort state
  let heatSortCol=-1,heatSortAsc=true;
  function sortHeatmap(colIdx){
    if(heatSortCol===colIdx)heatSortAsc=!heatSortAsc;else{heatSortCol=colIdx;heatSortAsc=true;}
    const tbody=document.getElementById('heatTbody');if(!tbody)return;
    const trs=[...tbody.querySelectorAll('tr:not(#heatTotalRow)')];
    trs.sort((a,b)=>{
      const ac=a.cells[colIdx],bc=b.cells[colIdx];
      if(colIdx===0){return heatSortAsc?a.cells[0].textContent.trim().localeCompare(b.cells[0].textContent.trim()):b.cells[0].textContent.trim().localeCompare(a.cells[0].textContent.trim());}
      const an=parseNum(ac?.textContent||''),bn=parseNum(bc?.textContent||'');
      return heatSortAsc?an-bn:bn-an;
    });
    trs.forEach(tr=>tbody.appendChild(tr));
    const totalRow=document.getElementById('heatTotalRow');if(totalRow)tbody.insertBefore(totalRow,tbody.firstChild);
    // Update sort icons
    document.querySelectorAll('#heatTable th .si').forEach((si,i)=>{si.textContent=i===colIdx?(heatSortAsc?'↑':'↓'):'↕';});
  }

  const heatThStyle=`${hBg}padding:5px 10px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--text3);white-space:nowrap;min-width:110px;cursor:pointer;user-select:none`;
  const heatmapHTML=mkCard('daily_heat','Evolução Mensal',
    `<div style="overflow-x:auto"><table id="heatTable" style="border-collapse:separate;border-spacing:2px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums">
      <thead><tr style="border-bottom:1px solid var(--border2)">
        <th onclick="sortHeatmap(0)" style="${sT}${hBg}padding:5px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--border2);min-width:130px;cursor:pointer;user-select:none">Tipster <span class="si">↕</span></th>
        <th onclick="sortHeatmap(1)" style="${sA}${hBg}padding:5px 10px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--text3);min-width:95px;cursor:pointer;user-select:none">Acumulado <span class="si">↕</span></th>
        ${mLabels.map((m,i)=>`<th onclick="sortHeatmap(${i+2})" style="${heatThStyle}">${m} <span class="si">↕</span></th>`).join('')}
      </tr></thead>
      <tbody id="heatTbody">
        <tr id="heatTotalRow" style="border-bottom:2px solid var(--border2)">
          <td style="${sT}${hBg}font-weight:700;color:var(--text);padding:5px 10px;border-right:1px solid var(--border2)">Total</td>
          <td style="${sA}${hBg}color:${totPL>=0?'var(--green)':'var(--red)'};text-align:right;padding:5px 10px;font-weight:700">${fmtPL(totPL)}</td>
          ${heatTotalCells}
        </tr>
        ${heatRows}
      </tbody>
    </table></div>`);

  // ── Blocos mensais ──
  let blocosHTML='';
  ymKeys.forEach(ymKey=>{
    const v=byTYMD[ymKey];
    const mLabel=MESES[v.month]+' '+v.year;
    const days=Object.keys(v.days).sort().reverse();
    const mTotalPL=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.pl||0),0);
    const mTotalN=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.n||0),0);
    const mW=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.w||0),0);
    const mL=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.l||0),0);
    const mHW=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.hw||0),0);
    const mHL=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.hl||0),0);
    const mV=allTipsters.reduce((a,t)=>a+(monthlyByT[ymKey+'_'+t]?.v||0),0);
    const mPLc=mTotalPL>=0?'var(--green)':'var(--red)';
    const mDetail=[mW?`W:${mW}`:'',mHW?`HW:${mHW}`:'',mL?`L:${mL}`:'',mHL?`HL:${mHL}`:'',mV?`V:${mV}`:''].filter(Boolean).join(' ');

    const dayHeaders=days.map(day=>{
      const dp=new Date(day+'T12:00:00');
      const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dp.getDay()];
      return`<th style="${hBg}padding:5px 8px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--text3);white-space:nowrap;min-width:88px">${ds} ${day.slice(8)}</th>`;
    }).join('');

    const dayTotalRow=`<tr style="border-bottom:2px solid var(--border2)">
      <td style="${sT}${hBg}font-weight:700;color:var(--text);padding:5px 10px;border-right:1px solid var(--border2)">Total</td>
      <td style="${sA}${hBg}color:${mPLc};text-align:right;padding:5px 10px;font-weight:700">${fmtPL(mTotalPL)}</td>
      ${days.map(day=>{
        const pl=allTipsters.reduce((a,t)=>a+(v.days[day]?.[t]?.pl||0),0);
        const n=allTipsters.reduce((a,t)=>a+(v.days[day]?.[t]?.n||0),0);
        if(n===0)return`<td style="${hBg}text-align:right;padding:5px 8px;color:var(--text3)">—</td>`;
        const c=pl>=0?'var(--green)':'var(--red)';
        const dW=allTipsters.reduce((a,t)=>a+(v.days[day]?.[t]?.w||0),0);
        const dL=allTipsters.reduce((a,t)=>a+(v.days[day]?.[t]?.l||0),0);
        return`<td style="${hBg}color:${c};text-align:right;padding:5px 8px;font-weight:700;white-space:nowrap">${fmtPL(pl)}<br><span style="font-size:9px;opacity:.55;color:var(--text3)">${n}b W:${dW} L:${dL}</span></td>`;
      }).join('')}
    </tr>`;

    const tipsterRows=allTipsters.map(t=>{
      const acc=monthlyByT[ymKey+'_'+t];
      const accC=acc?.pl>=0?'var(--green)':acc?.pl<0?'var(--red)':'var(--text3)';
      const dayCells=days.map(day=>tipsterCell(v.days[day]?.[t])).join('');
      const accDetail=acc?[acc.w?`W:${acc.w}`:'',acc.hw?`HW:${acc.hw}`:'',acc.l?`L:${acc.l}`:'',acc.hl?`HL:${acc.hl}`:'',acc.v?`V:${acc.v}`:''].filter(Boolean).join(' '):'';
      return`<tr>
        <td style="${sT}${rBg}font-weight:700;color:var(--text);padding:4px 10px;border-right:1px solid var(--border2);font-size:12px">${t}</td>
        <td style="${sA}${rBg}color:${accC};text-align:right;padding:4px 10px;font-weight:700">${acc?fmtPL(acc.pl):'—'}<br><span style="font-size:9px;opacity:.55;color:var(--text3)">${acc?.n||0}b ${accDetail}</span></td>
        ${dayCells}
      </tr>`;
    }).join('');

    // Header com mês grande, resultado alinhado, bets/resultados abaixo
    blocosHTML+=`<div class="month-block">
      <div class="month-hdr" onclick="toggleBlock('${ymKey}')">
        <div>
          <div style="display:flex;align-items:baseline;gap:16px">
            <span style="font-size:16px;font-weight:700;color:var(--text)">${mLabel}</span>
            <span style="font-size:15px;font-weight:700;color:${mPLc};font-family:'IBM Plex Mono',monospace">${fmtPL(mTotalPL)}</span>
          </div>
          <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px">${mTotalN}b · ${mDetail}</div>
        </div>
        <span class="month-tog" id="mtog_${ymKey}">▼</span>
      </div>
      <div class="month-body" id="mbody_${ymKey}">
        <div style="overflow-x:auto">
          <table style="border-collapse:collapse;font-size:12px;font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:400px">
            <thead><tr style="border-bottom:1px solid var(--border2)">
              <th style="${sT}${hBg}padding:5px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--border2);min-width:130px">Tipster</th>
              <th style="${sA}${hBg}padding:5px 10px;text-align:right;font-size:9px;text-transform:uppercase;color:var(--text3);min-width:95px">Mês</th>
              ${dayHeaders}
            </tr></thead>
            <tbody>${dayTotalRow}${tipsterRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('dailyContent').innerHTML=
    `<div class="row2" style="margin-bottom:1rem">${resumoAnualHTML}${heatmapHTML}</div>`+blocosHTML;
  setTimeout(()=>{makeSortable('tblDailyAnual',[1,2,3,4,5,6,7]);},100);
}

function toggleBlock(key){
  const body=document.getElementById('mbody_'+key);
  const tog=document.getElementById('mtog_'+key);
  if(!body)return;
  const isOpen=body.classList.contains('open');
  if(!isOpen){body.classList.add('open');if(tog)tog.style.transform='rotate(180deg)';}
  else{body.classList.remove('open');if(tog)tog.style.transform='';}
}

// Sports & Casas
function buildSummaryTable(tableId,label,ents,isCasa=false){
  const rows=ents.map(([nome,d])=>{
    const roi=d.s>0?(d.l/d.s*100):0,wr=d.t>0?(d.w/d.t*100):0;
    const lc=d.l>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    const label_cell=isCasa?casaCell(nome):nome;
    return`<tr><td style="font-weight:600;color:var(--text)">${label_cell}</td><td>${d.n}</td><td>${wr.toFixed(1)}%</td><td>${fmtR(d.s)}</td><td style="${lc}">${fmtPL(d.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td></tr>`;
  }).join('');
  const tot=ents.reduce((a,[,d])=>({n:a.n+d.n,w:a.w+d.w,t:a.t+d.t,s:a.s+d.s,l:a.l+d.l}),{n:0,w:0,t:0,s:0,l:0});
  const tRoi=tot.s>0?(tot.l/tot.s*100):0,tWr=tot.t>0?(tot.w/tot.t*100):0;
  const tlc=tot.l>=0?'color:var(--green)':'color:var(--red)';const trc=tRoi>=0?'color:var(--green)':'color:var(--red)';
  return`<div class="tbl-wrap" style="margin-top:.75rem"><table class="tbl" id="${tableId}"><thead><tr><th>${label}<span class="sort-icon"></span></th><th>Bets<span class="sort-icon"></span></th><th>Win Rate%<span class="sort-icon"></span></th><th>Turnover<span class="sort-icon"></span></th><th>Profit<span class="sort-icon"></span></th><th>ROI<span class="sort-icon"></span></th></tr></thead><tbody>${rows}<tr class="total-row"><td>Total</td><td>${tot.n}</td><td>${tWr.toFixed(1)}%</td><td>${fmtR(tot.s)}</td><td style="${tlc}">${fmtPL(tot.l)}</td><td style="${trc}">${(tRoi>=0?'+':'')+tRoi.toFixed(2)}%</td></tr></tbody></table></div>`;
}

function renderSport(rows){

  const ents=Object.entries(map).filter(e=>e[0]&&e[0]!=='undefined').sort((a,b)=>b[1].l-a[1].l);
  // Tabela ACIMA do gráfico
  document.getElementById('sportTable').innerHTML=buildSummaryTable('tblSport','Esporte',ents);
  setTimeout(()=>makeSortable('tblSport',[1,3,4,5]),100);
  // Gráfico vertical abaixo
  const wrap=document.querySelector('#chartSport')?.parentElement;
  if(wrap)wrap.style.height='280px';
  const topN=ents.slice(0,20); // max 20 esportes para legibilidade vertical
  const valLabelPlugin={id:'valLabels',afterDatasetsDraw(chart){
    const{ctx,scales:{x,y}}=chart;
    ctx.save();
    chart.getDatasetMeta(0).data.forEach((bar,i)=>{
      const v=topN[i]?.[1]?.l||0;
      const roi=topN[i]?.[1]?.s>0?(topN[i][1].l/topN[i][1].s*100):0;
      const lbl=(v>=0?'+':'')+fmtK(v);
      ctx.font='bold 10px IBM Plex Mono, monospace';
      ctx.fillStyle=isDark()?'rgba(255,255,255,.9)':'rgba(0,0,0,.85)';
      ctx.textAlign='center';
      ctx.textBaseline=v>=0?'bottom':'top';
      ctx.fillText(lbl,bar.x,v>=0?bar.y-3:bar.y+3);
    });
    ctx.restore();
  }};
  mkChart('chartSport',{type:'bar',data:{labels:topN.map(e=>e[0]),datasets:[{data:topN.map(e=>parseFloat(e[1].l.toFixed(2))),backgroundColor:topN.map(e=>e[1].l>=0?'rgba(0,214,143,.75)':'rgba(240,80,110,.75)'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24,bottom:4}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const e=topN[ctx.dataIndex];const roi=e[1].s>0?(e[1].l/e[1].s*100):0;return[fmtPL(e[1].l),`ROI: ${(roi>=0?'+':'')+roi.toFixed(1)}%`,`Apostas: ${e[1].n}`];}}}},scales:{x:{ticks:{color:tc(),font:{size:10},maxRotation:30},grid:{display:false},border:{display:false}},y:{ticks:{color:tc(),font:{size:10},callback:v=>fmtK(v)},grid:{color:gc()},border:{display:false}}}},plugins:[valLabelPlugin]});
}

function renderCasa(rows){
  const map={};rows.forEach(r=>{if(!map[r.casa])map[r.casa]={l:0,s:0,n:0,w:0,t:0};map[r.casa].l+=r.lucro;map[r.casa].s+=r.stake;map[r.casa].n++;if(r.resultado!=='V'){map[r.casa].t++;if(['W','HW'].includes(r.resultado))map[r.casa].w++;}});
  const ents=Object.entries(map).filter(e=>e[0]&&e[0]!=='undefined').sort((a,b)=>(b[1].s>0?b[1].l/b[1].s:0)-(a[1].s>0?a[1].l/a[1].s:0));
  const vals=ents.map(e=>e[1].s>0?parseFloat((e[1].l/e[1].s*100).toFixed(2)):0);
  // Tabela ACIMA
  document.getElementById('casaTable').innerHTML=buildSummaryTable('tblCasa','Casa',ents,true);
  setTimeout(()=>makeSortable('tblCasa',[1,3,4,5]),100);
  // Gráfico horizontal com ícones renderizados em HTML ao lado (não via canvas)
  // Usamos labels normais no eixo Y + padding left para o ícone via plugin separado
  const h=Math.max(300,ents.length*28+60);
  const wrap=document.querySelector('#chartCasa')?.parentElement;
  if(wrap)wrap.style.height=h+'px';
  // Plugin: desenha ícone 14px à esquerda do label do eixo Y, com espaço suficiente
  const ICON_PAD=26; // px reserved for icon
  const iconPlugin={id:'casaIcons',afterDraw(chart){
    const{ctx,scales:{y}}=chart;
    const ticks=y.getTicks();
    ticks.forEach((t,i)=>{
      const nome=ents[i]?.[0]||'';
      const url=casaIconUrl(nome);
      if(!url)return;
      const yp=y.getPixelForTick(i);
      const x=chart.chartArea.left-y.options.ticks.padding-ICON_PAD;
      const img=new Image(14,14);
      img.onload=()=>{
        ctx.save();
        // clip to circle
        ctx.beginPath();ctx.arc(x+7,yp,7,0,Math.PI*2);ctx.clip();
        ctx.drawImage(img,x,yp-7,14,14);
        ctx.restore();
      };
      img.src=url;
    });
    // value labels right of bars
    chart.getDatasetMeta(0).data.forEach((bar,i)=>{
      const v=vals[i];const n=ents[i]?.[1]?.n||0;
      ctx.save();
      ctx.font='bold 10px IBM Plex Mono, monospace';
      ctx.fillStyle=isDark()?'rgba(255,255,255,.88)':'rgba(0,0,0,.82)';
      ctx.textAlign=v>=0?'left':'right';
      ctx.textBaseline='middle';
      ctx.fillText(`${(v>=0?'+':'')+v.toFixed(2)}%  (${n})`,v>=0?bar.x+5:bar.x-5,bar.y);
      ctx.restore();
    });
  }};
  mkChart('chartCasa',{
    type:'bar',
    data:{labels:ents.map(e=>e[0]),datasets:[{data:vals,backgroundColor:vals.map(v=>v>=0?'rgba(52,211,153,.75)':'rgba(240,80,110,.72)'),borderRadius:4,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:170,left:10}},
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{
        x:{ticks:{color:tc(),font:{size:10},callback:v=>v.toFixed(0)+'%'},grid:{color:gc()},border:{display:false}},
        y:{ticks:{color:tc(),font:{size:11},padding:ICON_PAD+4},grid:{display:false},border:{display:false}}
      }},
    plugins:[iconPlugin]});
}

// Tipsters
function renderTipsters(){
  const selT=msGet('tipsters');
  const baseRows=filtrarPagina('tipsters');
  const allT=[...new Set(DADOS.map(r=>r.tipster).filter(Boolean))].sort();
  const activeT=selT.size>0?[...selT]:allT;
  // Comparison chart
  const byTDay={};activeT.forEach(t=>{byTDay[t]={};});
  baseRows.filter(r=>activeT.includes(r.tipster)).forEach(r=>{if(!byTDay[r.tipster])byTDay[r.tipster]={};const k=r.data.slice(0,10);if(!byTDay[r.tipster][k])byTDay[r.tipster][k]=0;byTDay[r.tipster][k]+=r.lucro;});
  const allDays=[...new Set(baseRows.map(r=>r.data.slice(0,10)))].sort();
  const step=Math.max(1,Math.floor(allDays.length/20));
  const lbl=allDays.filter((_,i)=>i%step===0||i===allDays.length-1).map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  const datasets=activeT.slice(0,15).map((t,i)=>{let cum=0;const data=allDays.map(d=>{cum+=byTDay[t]?.[d]||0;return parseFloat(cum.toFixed(2));}).filter((_,i)=>i%step===0||i===allDays.length-1);return{label:t,data,borderColor:TC_COLORS[i%TC_COLORS.length],backgroundColor:'transparent',tension:.4,pointRadius:0,borderWidth:2};});
  mkChart('chartTipsterLines',{type:'line',data:{labels:lbl,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:10},boxWidth:10,padding:12}}},scales:{x:{ticks:{color:tc(),font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{display:false},border:{display:false}},y:{ticks:{color:tc(),font:{size:10},callback:v=>'R$'+Math.round(v)},grid:{color:gc()},border:{display:false}}}}});

  // ── Resultados por Tipster (stacked horizontal) ──
  const tipsterMap={};
  baseRows.filter(r=>activeT.includes(r.tipster)).forEach(r=>{
    if(!tipsterMap[r.tipster])tipsterMap[r.tipster]={W:0,HW:0,L:0,HL:0,V:0};
    tipsterMap[r.tipster][r.resultado]=(tipsterMap[r.tipster][r.resultado]||0)+1;
  });
  const tipEnts=Object.entries(tipsterMap).sort((a,b)=>(b[1].W+b[1].HW)-(a[1].W+a[1].HW));
  const tipLabels=tipEnts.map(e=>e[0]);
  const resH=Math.max(180,tipEnts.length*36+60);
  const wrap=document.getElementById('chartTipsterResultsWrap');
  if(wrap)wrap.style.height=resH+'px';
  mkChart('chartTipsterResults',{type:'bar',data:{labels:tipLabels,datasets:[
    {label:'W',data:tipEnts.map(e=>e[1].W||0),backgroundColor:'rgba(0,214,143,.8)',borderRadius:2,stack:'s'},
    {label:'HW',data:tipEnts.map(e=>e[1].HW||0),backgroundColor:'rgba(52,211,153,.7)',borderRadius:2,stack:'s'},
    {label:'HL',data:tipEnts.map(e=>e[1].HL||0),backgroundColor:'rgba(248,113,113,.7)',borderRadius:2,stack:'s'},
    {label:'L',data:tipEnts.map(e=>e[1].L||0),backgroundColor:'rgba(240,80,110,.8)',borderRadius:2,stack:'s'},
    {label:'V',data:tipEnts.map(e=>e[1].V||0),backgroundColor:'rgba(128,128,160,.4)',borderRadius:2,stack:'s'},
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:true,position:'top',labels:{color:tc(),font:{size:11},boxWidth:12,padding:12}},
      tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw}}},
    scales:{
      x:{stacked:true,ticks:{color:tc(),font:{size:10}},grid:{color:gc()},border:{display:false}},
      y:{stacked:true,ticks:{color:tc(),font:{size:12,weight:'600'}},grid:{display:false},border:{display:false}}
    }}});
  // Comparison table
  const map={};
  baseRows.filter(r=>activeT.includes(r.tipster)).forEach(r=>{if(!map[r.tipster])map[r.tipster]={l:0,s:0,n:0,w:0,t:0,wt:0,stk:0};map[r.tipster].l+=r.lucro;map[r.tipster].s+=r.stake;map[r.tipster].n++;if(r.resultado!=='V'){map[r.tipster].t++;if(['W','HW'].includes(r.resultado))map[r.tipster].w++;}if(r.odd>0&&r.stake>0){map[r.tipster].wt+=r.odd*r.stake;map[r.tipster].stk+=r.stake;}});
  const ents=Object.entries(map).sort((a,b)=>b[1].l-a[1].l);
  const compRows=ents.map(([t,d])=>{
    const roi=d.s>0?(d.l/d.s*100):0,wr=d.t>0?(d.w/d.t*100):0;
    const avgOdd=d.stk>0?d.wt/d.stk:0,avgStake=d.n>0?d.s/d.n:0;
    const lc=d.l>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    return`<tr><td style="font-weight:700;color:var(--text)">${t}</td><td>${d.n}</td><td>${wr.toFixed(1)}%</td><td>${fmtR(d.s)}</td><td style="${lc}">${fmtPL(d.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td><td>${avgOdd.toFixed(2)}</td><td>${fmtR(avgStake)}</td></tr>`;
  }).join('');
  document.getElementById('tipsterCompTable').innerHTML=`<table class="tbl" id="tblTipComp"><thead><tr><th>Tipster<span class="sort-icon"></span></th><th>Bets<span class="sort-icon"></span></th><th>Win Rate%<span class="sort-icon"></span></th><th>Turnover<span class="sort-icon"></span></th><th>Profit<span class="sort-icon"></span></th><th>ROI<span class="sort-icon"></span></th><th>Odd Méd. Pond.<span class="sort-icon"></span></th><th>Stake Média<span class="sort-icon"></span></th></tr></thead><tbody>${compRows}</tbody></table>`;
  setTimeout(()=>makeSortable('tblTipComp',[1,3,4,5,6,7]),100);

  const singleT=selT.size===1?[...selT][0]:'all';

  const byM={};
  trows.forEach(r=>{const d=new Date(r.data+'T12:00:00'),k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;if(!byM[k])byM[k]={bets:0,pl:0,s:0,w:0,t:0,wt:0,stk:0,ano:d.getFullYear(),mes:d.getMonth()};byM[k].bets++;byM[k].pl+=r.lucro;byM[k].s+=r.stake;if(r.resultado!=='V'){byM[k].t++;if(['W','HW'].includes(r.resultado))byM[k].w++;}if(r.odd>0&&r.stake>0){byM[k].wt+=r.odd*r.stake;byM[k].stk+=r.stake;}});
  let totPL=0,totS=0,totB=0,totW=0,totT=0;
  const mHTML=Object.keys(byM).sort().map(k=>{
    const v=byM[k];const roi=v.s>0?(v.pl/v.s*100):0,wr=v.t>0?(v.w/v.t*100):0;
    const avgOdd=v.stk>0?v.wt/v.stk:0,avgStake=v.bets>0?v.s/v.bets:0;
    totPL+=v.pl;totS+=v.s;totB+=v.bets;totW+=v.w;totT+=v.t;
    const pc=v.pl>=0?'color:var(--green)':'color:var(--red)';
    const rc=roi>=0?'color:var(--green)':'color:var(--red)';
    return`<tr><td>${MESES[v.mes]} ${v.ano}</td><td>${v.bets}</td><td style="${pc}">${fmtPL(v.pl)}</td><td>${fmtR(v.s)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td><td>${wr.toFixed(1)}%</td><td>${fmtR(avgStake)}</td><td>${avgOdd.toFixed(2)}</td></tr>`;
  }).join('');
  const tRoi=totS>0?(totPL/totS*100):0,tWr=totT>0?(totW/totT*100):0;
  const tc2=totPL>=0?'color:var(--green)':'color:var(--red)';const rc2=tRoi>=0?'color:var(--green)':'color:var(--red)';
  document.querySelector('#tipsterMonthTable tbody').innerHTML=mHTML+`<tr class="total-row"><td>Total</td><td>${totB}</td><td style="${tc2}">${fmtPL(totPL)}</td><td>${fmtR(totS)}</td><td style="${rc2}">${(tRoi>=0?'+':'')+tRoi.toFixed(2)}%</td><td>${tWr.toFixed(1)}%</td><td>${totB>0?fmtR(totS/totB):'—'}</td><td>—</td></tr>`;
  setTimeout(()=>makeSortable('tipsterMonthTable',[1,2,3,4,5,6,7]),100);
}

// Apostas — espelho da base de dados com virtual scroll
let apostasFiltered=[], apostasSortCol=0, apostasSortAsc=false;
let apostasColFilters={};

function renderApostas(){
  const baseRows=filtrarPagina('apostas');
  apostasFiltered=baseRows.filter(r=>{
    return APOSTAS_COLS.every((col,i)=>{
      const f=(apostasColFilters[i]||'').toLowerCase().trim();
      if(!f)return true;
      const v=col==='lucro'?r.lucro.toFixed(2):col==='stake'?r.stake.toString():col==='odd'?r.odd.toString():(r[col]||'').toString();
      return v.toLowerCase().includes(f);
    });
  });
  apostasFiltered.sort((a,b)=>{
    const col=APOSTAS_COLS[apostasSortCol];
    const av=APOSTAS_NUM.includes(apostasSortCol)?parseFloat(a[col]||0):String(a[col]||'');
    const bv=APOSTAS_NUM.includes(apostasSortCol)?parseFloat(b[col]||0):String(b[col]||'');
    const res=APOSTAS_NUM.includes(apostasSortCol)?(av-bv):av.localeCompare(bv);
    return apostasSortAsc?res:-res;
  });
  // KPI
  const pl=apostasFiltered.reduce((a,r)=>a+r.lucro,0);
  const stake=apostasFiltered.reduce((a,r)=>a+r.stake,0);
  const roi=stake>0?(pl/stake*100):0;
  const wins=apostasFiltered.filter(r=>['W','HW'].includes(r.resultado)).length;
  const settled=apostasFiltered.filter(r=>r.resultado!=='V').length;
  const wr=settled>0?(wins/settled*100):0;
  const kpiEl=document.getElementById('apostasKPI');
  if(kpiEl)kpiEl.innerHTML=[
    {l:'Apostas',v:apostasFiltered.length.toLocaleString('pt-BR'),c:'neu',
      sub:[
        apostasFiltered.filter(r=>r.resultado==='W').length?`<span class="res-w">W:${apostasFiltered.filter(r=>r.resultado==='W').length}</span>`:'',
        apostasFiltered.filter(r=>r.resultado==='HW').length?`<span class="res-hw">HW:${apostasFiltered.filter(r=>r.resultado==='HW').length}</span>`:'',
        apostasFiltered.filter(r=>r.resultado==='L').length?`<span class="res-l">L:${apostasFiltered.filter(r=>r.resultado==='L').length}</span>`:'',
        apostasFiltered.filter(r=>r.resultado==='HL').length?`<span class="res-hl">HL:${apostasFiltered.filter(r=>r.resultado==='HL').length}</span>`:'',
        apostasFiltered.filter(r=>r.resultado==='V').length?`<span class="res-v">V:${apostasFiltered.filter(r=>r.resultado==='V').length}</span>`:''
      ].filter(Boolean).join(' ')},
    {l:'P/L',v:fmtPL(pl),c:pl>=0?'pos':'neg',sub:''},
    {l:'Turnover',v:fmtR(stake),c:'neu',sub:''},
    {l:'ROI',v:(roi>=0?'+':'')+roi.toFixed(2)+'%',c:roi>=0?'pos':'neg',sub:''},
    {l:'Win Rate',v:wr.toFixed(1)+'%',c:wr>=50?'pos':'neg',sub:`${settled} apostas encerradas`},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c}" style="font-size:18px">${k.v}</div>${k.sub?`<div class="kpi-sub" style="font-size:10px;margin-top:4px;font-family:'IBM Plex Mono',monospace">${k.sub}</div>`:''}</div>`).join('');
  // Sort icons
  document.querySelectorAll('#apostasTable th .asi').forEach((si,i)=>{
    si.textContent=i===apostasSortCol?(apostasSortAsc?'↑':'↓'):'↕';
  });
  // Column resizers on apostas table
  setTimeout(()=>{
    document.querySelectorAll('#apostasTable thead tr:first-child th').forEach((th,i)=>{
      th.style.position='relative';
      if(!th.querySelector('.col-rsz')){
        const rsz=document.createElement('div');
        rsz.className='col-rsz';
        rsz.addEventListener('mousedown',e=>{
          e.stopPropagation();e.preventDefault();
          rsz.classList.add('active');
          const startX=e.clientX,startW=th.offsetWidth;
          function onMove(ev){
            const nw=Math.max(40,startW+ev.clientX-startX);
            th.style.width=nw+'px';th.style.minWidth=nw+'px';
          }
          function onUp(){rsz.classList.remove('active');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        });
        th.appendChild(rsz);
      }
    });
  },100);
  // Virtual scroll render
  renderApostasVirt();
}

function renderApostasVirt(){
  const cont=document.getElementById('apostasCont');
  if(!cont)return;
  const rows=apostasFiltered;
  const total=rows.length;
  const scrollTop=cont.scrollTop;
  const contH=cont.clientHeight||600;
  const startIdx=Math.max(0,Math.floor(scrollTop/ROW_H)-30);
  const endIdx=Math.min(total,Math.ceil((scrollTop+contH)/ROW_H)+30);
  const topPad=startIdx*ROW_H;
  const botPad=Math.max(0,(total-endIdx)*ROW_H);
  const tbody=document.getElementById('apostasTbody');
  if(!tbody)return;
  tbody.innerHTML=`<tr style="height:${topPad}px"><td colspan="11"></td></tr>`+
    rows.slice(startIdx,endIdx).map(r=>{
      const plC=r.lucro>0?'var(--green)':r.lucro<0?'var(--red)':'var(--text3)';
      const resC=resColor(r.resultado);
      return`<tr style="height:${ROW_H}px">
        <td style="white-space:nowrap">${r.data.slice(0,10).split('-').reverse().join('/')}</td>
        <td>${r.esporte||'—'}</td>
        <td style="font-weight:600;color:var(--text)">${r.tipster||'—'}</td>
        <td>${casaCell(r.casa)}</td>
        <td style="font-size:11px;color:var(--text3)">${r.parceiro||'—'}</td>
        <td>${r.aposta||'—'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--text2)" title="${(r.descricao||'').replace(/"/g,'&quot;')}">${r.descricao||'—'}</td>
        <td style="text-align:right">${fmtR(r.stake)}</td>
        <td style="text-align:right">${r.odd.toFixed(2)}</td>
        <td style="text-align:center;font-weight:700;color:${resC}">${r.resultado}</td>

}

function apostasSort(colIdx){
  if(apostasSortCol===colIdx)apostasSortAsc=!apostasSortAsc;
  else{apostasSortCol=colIdx;apostasSortAsc=false;}
  renderApostas();
}
function apostasFilter(colIdx,val){apostasColFilters[colIdx]=val;renderApostas();}

// Parceiros / Fornecedores
function normForn(f){return(!f||f==='—')?'Eu':f;}

// Persistent cost store
const COST_KEY='dash_custos_v2';
let custoData={};
(()=>{try{custoData=JSON.parse(localStorage.getItem(COST_KEY)||'{}')}catch(e){}})();
function saveCusto(forn,casa,val){
  const k=forn+'||'+casa;
  const n=parseFloat(val.replace(/\./g,'').replace(',','.'));
  if(!isNaN(n)&&n>0)custoData[k]=n; else delete custoData[k];
  try{localStorage.setItem(COST_KEY,JSON.stringify(custoData));}catch(e){}
  recalcCustos();
  renderCostPies();
}
let _costState={allForns:[],allCasas:[],contaCount:{}};

function recalcCustos(){
  const{allForns,allCasas,contaCount}=_costState;
  let grandTot=0;
  const fornTotals={};allForns.forEach(f=>fornTotals[f]=0);
  document.querySelectorAll('#costTbody tr[data-casa]').forEach(tr=>{
    const casa=tr.dataset.casa;
    let rowTot=0;
    allForns.forEach(f=>{
      const k=f+'||'+casa;
      const custo=custoData[k]||0;
      const nContas=contaCount[k]||0;
      const tot=custo*nContas;
      rowTot+=tot;
      fornTotals[f]+=tot;
      const totEl=tr.querySelector('[data-tot-forn="'+f+'"]');
      if(totEl)totEl.textContent=tot>0?'R$ '+fmt(tot,0):'—';
    });
    grandTot+=rowTot;
    const rowTotEl=tr.querySelector('.cost-row-total');
    if(rowTotEl)rowTotEl.textContent=rowTot>0?'R$ '+fmt(rowTot,0):'—';
  });
  allForns.forEach(f=>{
    const el=document.getElementById('cost-col-tot-'+CSS.escape(f));
    if(el)el.textContent=fornTotals[f]>0?'R$ '+fmt(fornTotals[f],0):'—';
  });
  const gt=document.getElementById('cost-grand-total');
  if(gt)gt.textContent=grandTot>0?'R$ '+fmt(grandTot,0):'—';
}

function renderCostPies(){
  const{allForns,allCasas,contaCount}=_costState;
  if(!document.getElementById('chartCostForn'))return;
  const fornTots={};
  allForns.forEach(f=>{fornTots[f]=allCasas.reduce((a,c)=>{const k=f+'||'+c;return a+(custoData[k]||0)*(contaCount[k]||0);},0);});
  const fEnts=Object.entries(fornTots).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
  const casaTots={};
  allCasas.forEach(c=>{casaTots[c]=allForns.reduce((a,f)=>{const k=f+'||'+c;return a+(custoData[k]||0)*(contaCount[k]||0);},0);});
  const cEnts=Object.entries(casaTots).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
  const PIE_COLORS=['#00d68f','#5b9cf6','#f0a030','#a78bfa','#2dd4bf','#f87171','#34d399','#fbbf24','#60a5fa','#c084fc','#fb923c','#ffd700','#ff8c69','#dda0dd','#87ceeb'];
  const noData=fEnts.length===0;
  const msg=document.getElementById('costPieMsg');
  if(msg)msg.style.display=noData?'block':'none';
  if(noData){destroyChart('chartCostForn');destroyChart('chartCostCasa');return;}
  const pieOpts=(totalVal)=>({responsive:true,maintainAspectRatio:false,plugins:{
    legend:{display:true,position:'right',labels:{color:tc(),font:{size:11},boxWidth:12,padding:8,
      generateLabels(chart){const ds=chart.data.datasets[0];return chart.data.labels.map((lbl,i)=>{
        const v=ds.data[i];const pct=totalVal>0?(v/totalVal*100).toFixed(1):'0';
        return{text:lbl+'  '+pct+'%  (R$ '+fmt(v,0)+')',fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],hidden:false,index:i};
      });}}},
    tooltip:{callbacks:{label:ctx=>'R$ '+fmt(ctx.raw,0)+'  ('+( totalVal>0?(ctx.raw/totalVal*100).toFixed(1):'0')+'%)'}}}});
  const fTotal=fEnts.reduce((a,e)=>a+e[1],0);
  mkChart('chartCostForn',{type:'doughnut',data:{labels:fEnts.map(e=>e[0]),datasets:[{data:fEnts.map(e=>parseFloat(e[1].toFixed(2))),backgroundColor:PIE_COLORS.slice(0,fEnts.length),borderWidth:2,borderColor:isDark()?'#17171d':'#fff'}]},options:pieOpts(fTotal)});
  const cTotal=cEnts.reduce((a,e)=>a+e[1],0);
  mkChart('chartCostCasa',{type:'doughnut',data:{labels:cEnts.map(e=>e[0]),datasets:[{data:cEnts.map(e=>parseFloat(e[1].toFixed(2))),backgroundColor:PIE_COLORS.slice(0,cEnts.length),borderWidth:2,borderColor:isDark()?'#17171d':'#fff'}]},options:pieOpts(cTotal)});
}

function buildCostTable(allForns,allCasas,contaCount){
  _costState={allForns,allCasas,contaCount};
  // ── header ──
  const nCols=allForns.map(f=>`<th style="text-align:center;min-width:70px">${f}<br><span style="font-size:9px;color:var(--blue);font-weight:400;font-family:'IBM Plex Mono',monospace">Contas</span></th>`).join('');
  const cCols=allForns.map(f=>`<th style="text-align:center;min-width:100px">${f}<br><span style="font-size:9px;color:var(--amber);font-weight:400;font-family:'IBM Plex Mono',monospace">Custo/conta</span></th>`).join('');
  const tCols=allForns.map(f=>`<th style="text-align:center;min-width:90px">${f}<br><span style="font-size:9px;color:var(--green);font-weight:400;font-family:'IBM Plex Mono',monospace">Total</span></th>`).join('');
  const header=`<tr><th style="text-align:left;position:sticky;left:0;background:var(--bg4);z-index:2;min-width:140px">Casa</th>${nCols}${cCols}${tCols}<th style="text-align:center;border-left:1px solid var(--border2);min-width:100px">Total Geral</th></tr>`;

  // ── total row (topo) ──
  const grandTot=allCasas.reduce((a,c)=>a+allForns.reduce((b,f)=>{const k=f+'||'+c;return b+(custoData[k]||0)*(contaCount[k]||0);},0),0);
  const totNcols=allForns.map(f=>{const n=allCasas.reduce((a,c)=>a+(contaCount[f+'||'+c]||0),0);return`<td style="text-align:center;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:11px">${n||'—'}</td>`;}).join('');
  const totEmptyCols=allForns.map(()=>`<td></td>`).join('');
  const totFornCols=allForns.map(f=>{const tot=allCasas.reduce((a,c)=>{const k=f+'||'+c;return a+(custoData[k]||0)*(contaCount[k]||0);},0);return`<td id="cost-col-tot-${f}" style="text-align:center;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:11px">${tot>0?'R$ '+fmt(tot,0):'—'}</td>`;}).join('');
  const totalRow=`<tr class="total-row" style="border-bottom:2px solid var(--border2)"><td style="position:sticky;left:0;background:var(--bg4);z-index:1;font-weight:700">Total</td>${totNcols}${totEmptyCols}${totFornCols}<td id="cost-grand-total" style="text-align:center;font-weight:700;border-left:1px solid var(--border2);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--amber)">${grandTot>0?'R$ '+fmt(grandTot,0):'—'}</td></tr>`;

  // ── body rows ──
  const bodyRows=allCasas.map(c=>{
    const nCells=allForns.map(f=>{const n=contaCount[f+'||'+c]||0;return`<td style="text-align:center;font-weight:600;color:${n>0?'var(--text)':'var(--text3)'};font-family:'IBM Plex Mono',monospace;font-size:11px">${n||'—'}</td>`;}).join('');
    const inputCells=allForns.map(f=>{
      const k=f+'||'+c;const saved=custoData[k]?custoData[k].toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'';const n=contaCount[k]||0;
      const safe_f=f.replace(/\\/g,'\\\\').replace(/'/g,"\\'");const safe_c=c.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return`<td style="text-align:center;padding:3px 5px">${n>0?`<input type="text" value="${saved}" placeholder="0,00" style="width:84px;text-align:right;padding:3px 7px;background:var(--bg5);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none" onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='var(--border2)';saveCusto('${safe_f}','${safe_c}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`:'<span style="color:var(--text3);font-size:11px">—</span>'}</td>`;
    }).join('');
    const totalCells=allForns.map(f=>{const k=f+'||'+c;const n=contaCount[k]||0;const custo=custoData[k]||0;const tot=custo*n;return`<td data-tot-forn="${f}" style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">${tot>0?'R$ '+fmt(tot,0):'—'}</td>`;}).join('');
    const rowTot=allForns.reduce((a,f)=>{const k=f+'||'+c;return a+(custoData[k]||0)*(contaCount[k]||0);},0);
    return`<tr data-casa="${c}"><td style="font-weight:600;color:var(--text);position:sticky;left:0;background:var(--bg3);z-index:1;padding:4px 8px">${casaCell(c)}</td>${nCells}${inputCells}${totalCells}<td class="cost-row-total" style="text-align:center;font-weight:700;border-left:1px solid var(--border2);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text)">${rowTot>0?'R$ '+fmt(rowTot,0):'—'}</td></tr>`;
  }).join('');

  document.getElementById('costTableWrap').innerHTML=`
    <p style="font-size:11px;color:var(--text3);margin-bottom:.75rem;font-family:'IBM Plex Mono',monospace">💡 Insira o custo de cada conta comprada por fornecedor/casa. O total é calculado pelo nº de contas ativas. Valores salvos automaticamente no navegador.</p>
    <div class="tbl-wrap"><table class="tbl" id="tblCost"><thead>${header}</thead><tbody id="costTbody">${totalRow}${bodyRows}</tbody></table></div>`;
  setTimeout(()=>makeSortable('tblCost',[]),100);
  renderCostPies();
}

function renderParceiros(rows){
  const normRows=rows.map(r=>({...r,fornecedor:normForn(r.fornecedor)}));
  // ── Resumo por fornecedor ──
  const byForn={};
  normRows.forEach(r=>{const f=r.fornecedor;if(!byForn[f])byForn[f]={l:0,s:0,n:0,contas:new Set()};byForn[f].l+=r.lucro;byForn[f].s+=r.stake;byForn[f].n++;byForn[f].contas.add(r.conta);});
  const fornEnts=Object.entries(byForn).sort((a,b)=>b[1].l-a[1].l);
  const fornNames=fornEnts.map(e=>e[0]);const fornVals=fornEnts.map(e=>parseFloat(e[1].l.toFixed(2)));
  mkChart('chartForn',{type:'bar',data:{labels:fornNames,datasets:[{data:fornVals,backgroundColor:fornVals.map(v=>v>=0?'rgba(0,214,143,.65)':'rgba(240,80,110,.65)'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R$ '+fmt(ctx.raw)}}},scales:{x:{ticks:{color:tc(),font:{size:10},callback:v=>'R$'+fmt(v,0)},grid:{color:gc()},border:{display:false}},y:{ticks:{color:tc(),font:{size:11}},grid:{display:false},border:{display:false}}}}});
  const fornRows=fornEnts.map(([f,d])=>{const roi=d.s>0?(d.l/d.s*100):0;const lc=d.l>=0?'color:var(--green)':'color:var(--red)';const rc=roi>=0?'color:var(--green)':'color:var(--red)';return`<tr><td style="font-weight:700;color:var(--text)">${f}</td><td>${d.contas.size}</td><td>${d.n}</td><td>${fmtR(d.s)}</td><td style="${lc}">${fmtPL(d.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(2)}%</td></tr>`;}).join('');
  document.getElementById('fornTable').innerHTML=`<table class="tbl" id="tblForn"><thead><tr><th>Fornecedor<span class="sort-icon"></span></th><th>Contas<span class="sort-icon"></span></th><th>Apostas<span class="sort-icon"></span></th><th>Turnover<span class="sort-icon"></span></th><th>Lucro<span class="sort-icon"></span></th><th>ROI<span class="sort-icon"></span></th></tr></thead><tbody>${fornRows}</tbody></table>`;
  setTimeout(()=>makeSortable('tblForn',[1,2,3,4,5]),100);
  // ── Tabela cruzada ──
  const allForns=[...new Set(normRows.map(r=>r.fornecedor))].sort();
  const allCasas=[...new Set(normRows.map(r=>r.casa).filter(Boolean))].sort();
  const contaMap={};
  normRows.forEach(r=>{const k=r.casa+'||'+r.fornecedor;if(!contaMap[k])contaMap[k]=new Set();contaMap[k].add(r.conta);});
  const contaCount={};
  allForns.forEach(f=>allCasas.forEach(c=>{const s=contaMap[c+'||'+f];contaCount[f+'||'+c]=s?s.size:0;}));
  const casaTotal={};allCasas.forEach(c=>{casaTotal[c]=allForns.reduce((a,f)=>a+(contaCount[f+'||'+c]||0),0);});
  const grandTotal=allCasas.reduce((a,c)=>a+casaTotal[c],0);
  const totRowCross=`<tr class="total-row" style="border-bottom:2px solid var(--border2)"><td style="position:sticky;left:0;background:var(--bg4);z-index:1;font-weight:700">Total</td>${allForns.map(f=>{const n=allCasas.reduce((a,c)=>a+(contaCount[f+'||'+c]||0),0);return`<td style="text-align:center;font-weight:700">${n||'—'}</td>`;}).join('')}<td style="text-align:center;font-weight:700;border-left:1px solid var(--border2)">${grandTotal}</td></tr>`;
  const crossHeader=`<tr><th style="text-align:left;position:sticky;left:0;background:var(--bg4);z-index:2">Casa</th>${allForns.map(f=>`<th style="text-align:center">${f}<span class="sort-icon"></span></th>`).join('')}<th style="text-align:center;border-left:1px solid var(--border2)">Total<span class="sort-icon"></span></th></tr>`;
  const crossRows=allCasas.map(c=>{const cells=allForns.map(f=>{const n=contaCount[f+'||'+c]||0;return`<td style="text-align:center;color:${n>0?'var(--text)':'var(--text3)'}">${n||'—'}</td>`;}).join('');const tot=casaTotal[c];return`<tr><td style="font-weight:600;color:var(--text);position:sticky;left:0;background:var(--bg3);z-index:1">${casaCell(c)}</td>${cells}<td style="text-align:center;font-weight:700;border-left:1px solid var(--border2)">${tot||'—'}</td></tr>`;}).join('');
  document.getElementById('crossTable').innerHTML=`<div class="tbl-wrap"><table class="tbl" id="tblCross"><thead>${crossHeader}</thead><tbody>${totRowCross}${crossRows}</tbody></table></div>`;
  setTimeout(()=>makeSortable('tblCross',[...Array(allForns.length+1).keys()].slice(1)),100);
  // ── Cost table ──
  buildCostTable(allForns,allCasas,contaCount);
  // ── Contas Individuais ──
  const map={};
  normRows.forEach(r=>{const key=r.fornecedor+'||'+r.conta+'||'+r.casa;if(!map[key])map[key]={conta:r.conta,forn:r.fornecedor,casa:r.casa,n:0,s:0,l:0,datas:[]};map[key].n++;map[key].s+=r.stake;map[key].l+=r.lucro;map[key].datas.push(r.data);});
  const accRows=Object.values(map).sort((a,b)=>b.l-a.l).map(e=>{const roi=e.s>0?(e.l/e.s*100):0;const lc=e.l>=0?'color:var(--green)':'color:var(--red)';const rc=roi>=0?'color:var(--green)':'color:var(--red)';const sorted=e.datas.slice().sort();const d1=sorted[0].slice(0,10).split('-'),d2=sorted[sorted.length-1].slice(0,10).split('-');const dias=Math.round((new Date(sorted[sorted.length-1])-new Date(sorted[0]))/864e5);return`<tr><td style="font-weight:700;color:var(--text)">${e.forn}</td><td>${e.conta}</td><td>${casaCell(e.casa)}</td><td>${e.n}</td><td>${fmtR(e.s)}</td><td style="${lc}">${fmtPL(e.l)}</td><td style="${rc}">${(roi>=0?'+':'')+roi.toFixed(1)}%</td><td>${d1[2]}/${d1[1]}/${d1[0].slice(2)}</td><td>${d2[2]}/${d2[1]}/${d2[0].slice(2)}</td><td>${dias}d</td></tr>`;}).join('');
  document.getElementById('parcTable').innerHTML=`<table class="tbl" id="tblParc"><thead><tr><th>Fornecedor<span class="sort-icon"></span></th><th>Conta<span class="sort-icon"></span></th><th>Casa<span class="sort-icon"></span></th><th>Bets<span class="sort-icon"></span></th><th>Turnover<span class="sort-icon"></span></th><th>Profit<span class="sort-icon"></span></th><th>ROI<span class="sort-icon"></span></th><th>1ª Aposta<span class="sort-icon"></span></th><th>Última<span class="sort-icon"></span></th><th>Período<span class="sort-icon"></span></th></tr></thead><tbody>${accRows}</tbody></table>`;
  setTimeout(()=>makeSortable('tblParc',[3,4,5,6,9]),100);
}
// Metrics knowledge base
function renderMetrics(rows){
  const mddR=calcMDDreais(rows),mddPct=calcMDDpct(rows);
  const xmdd=calcXMDD(rows),emdd=xmdd*0.85;
  const pval=calcPValue(rows),pl=rows.reduce((a,r)=>a+r.lucro,0);
  const profEmdd=emdd>0?(pl/emdd).toFixed(2):'—';
  const roi=calcROI(rows),wr=calcWR(rows),avgOdd=calcAvgOdd(rows);
  const stake=rows.reduce((a,r)=>a+r.stake,0);
  document.getElementById('metricsKPI').innerHTML=[
    {l:'MDD Real (R$)',v:'R$ '+fmt(mddR,0),c:mddR<5000?'pos':mddR<15000?'neu':'neg'},
    {l:'MDD Real (%)',v:mddPct.toFixed(2)+'%',c:mddPct<15?'pos':mddPct<30?'neu':'neg'},
    {l:'EMDD (R$)',v:'R$ '+fmt(emdd,0),c:emdd<5000?'pos':emdd<15000?'neu':'neg'},
    {l:'XMDD Monte Carlo',v:'R$ '+fmt(xmdd,0),c:xmdd<5000?'pos':xmdd<15000?'neu':'neg'},
    {l:'P-Value',v:pval<0.001?'<0.001':pval.toFixed(3),c:pval<0.05?'pos':pval<0.15?'neu':'neg'},
    {l:'Profit / EMDD',v:profEmdd,c:parseFloat(profEmdd)>=5?'pos':parseFloat(profEmdd)>=2?'neu':'neg'},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c}">${k.v}</div></div>`).join('');
}

          <div class="metric-formula">P-Value = P(WR ≥ WR_observado | sem habilidade)</div>
          <div class="term-grid">
            <div class="term-card"><div class="term-name">&lt; 5% (0.05)</div><div class="term-def">Estatisticamente significativo. Seus resultados provavelmente não são acaso.</div></div>
            <div class="term-card"><div class="term-name">&lt; 1% (0.01)</div><div class="term-def">Altamente significativo. Evidência forte de edge real.</div></div>
            <div class="term-card"><div class="term-name">&lt; 0.1% (0.001)</div><div class="term-def">Nível exigido por pesquisadores rigorosos para confirmar edge.</div></div>
            <div class="term-card"><div class="term-name">&gt; 5%</div><div class="term-def">Não significativo. Mais apostas necessárias para confirmar o edge.</div></div>
          </div>`)}

        ${mkCard('m_pemdd','Profit / EMDD',`
          <div class="metric-desc">Ratio entre o lucro total e o drawdown esperado. Mede a eficiência da estratégia: quanto lucro você gera para cada unidade de risco.</div>
          <div class="metric-formula">Profit/EMDD = Lucro Total / EMDD</div>
          <div class="term-grid">
            <div class="term-card"><div class="term-name">&gt; 5</div><div class="term-def">Método excelente. Alto retorno para o risco tomado.</div></div>
            <div class="term-card"><div class="term-name">2 – 5</div><div class="term-def">Método bom. Adequado para operação profissional.</div></div>
            <div class="term-card"><div class="term-name">&lt; 2</div><div class="term-def">Método marginal. Risco elevado em relação ao retorno.</div></div>
            <div class="term-card"><div class="term-name">&lt; 1</div><div class="term-def">Risco maior que retorno. Revisar estratégia.</div></div>
          </div>`)}

        ${mkCard('m_gloss','Glossário de Resultados',`
          <div class="term-grid">
            <div class="term-card"><div class="term-name">W — Win</div><div class="term-def">Aposta totalmente ganha. Retorno = stake × odd.</div></div>
            <div class="term-card"><div class="term-name">L — Loss</div><div class="term-def">Aposta totalmente perdida. Retorno = 0. Lucro = −stake.</div></div>
            <div class="term-card"><div class="term-name">HW — Half Win</div><div class="term-def">Metade da stake ganha, metade devolvida. Ocorre em handicap asiático. Retorno = (stake/2)×odd + stake/2.</div></div>
            <div class="term-card"><div class="term-name">HL — Half Loss</div><div class="term-def">Metade da stake perdida, metade devolvida. Retorno = stake/2. Lucro = −stake/2.</div></div>
            <div class="term-card"><div class="term-name">V — Void</div><div class="term-def">Aposta anulada. Stake devolvida integralmente. Não conta no Win Rate.</div></div>
            <div class="term-card"><div class="term-name">Turnover</div><div class="term-def">Soma total de todas as stakes apostadas. Também chamado de Volume apostado.</div></div>
            <div class="term-card"><div class="term-name">Edge / Value</div><div class="term-def">Vantagem real sobre a casa. Existe quando a odd oferecida é maior que a probabilidade real do evento.</div></div>
            <div class="term-card"><div class="term-name">Bankroll</div><div class="term-def">Capital total disponível para apostas. O gerenciamento do bankroll define o tamanho das stakes e controla o risco de ruína.</div></div>
          </div>`)}
      </div>

    </div></main>
  </div>`;

  document.getElementById('themeLabel').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'Claro':'Escuro';
  showPage('overview');
}

async function loadData(){
  document.getElementById('root').innerHTML=`<div class="loader"><div class="spinner"></div><span>carregando dados...</span></div>`;
  try{
    const res=await fetch(APPS_SCRIPT_URL);const json=await res.json();
    if(!json.ok)throw new Error(json.error||'Erro desconhecido');
    DADOS=json.data;buildHTML();
    document.getElementById('lastUpdate').textContent=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(err){
    document.getElementById('root').innerHTML=`<div style="padding:2rem"><div class="error-box"><strong>Erro ao carregar dados</strong><br><br>${err.message}</div></div>`;
  }
}
loadData();
</script>
</body>
</html>
